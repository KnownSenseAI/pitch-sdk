        target_count:
          type: integer
          minimum: 1
          maximum: 500
        targets:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/OutputTarget"
        version:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        retired_at:
          type: string
          format: date-time
    PutTargetBindingRequest:
      type: object
      required:
        - zone_id
      additionalProperties: false
      properties:
        zone_id:
          type: string
          format: uuid
        resolution_mode:
          type: string
          enum:
            - live_zone
            - pinned_snapshot
          description: Omit for backward-compatible live_zone resolution.
        expected_zone_version:
          type: integer
          format: int64
          minimum: 1
        expected_target_hash:
          type: string

        - status
        - content_config
        - priority
        - timezone
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 60
        type:
          type: string
          enum:
            - scheduled
            - repetitive
            - chained
            - dynamic
        status:
          type: string
        content_config:
          type: object
          additionalProperties: true
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        targeting_config:
          type: object
          additionalProperties: true
        device_id:
          type: string
        group_id:
          type: string
        priority:

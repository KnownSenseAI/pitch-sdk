        - impact
      properties:
        asset:
          $ref: "#/components/schemas/AudioAsset"
        active_revision:
          type: integer
        text:
          type: string
        language:
          type: string
        name:
          type: string
        editable:
          type: boolean
        reason:
          type: string
        impact:
          $ref: "#/components/schemas/AudioAssetUsageImpact"
    AudioDownloadResponse:
      type: object
      required:
        - asset_id
        - download_url
        - expires_at
        - filename
        - content_type
      properties:
        asset_id:
          type: string

          type: integer
          description: Maximum attempts before the delivery becomes dead_letter.
        created_at:
          type: string
          format: date-time
    Webhook:
      type: object
      required:
        - id
        - tenant_id
        - url
        - events
        - active
        - created_at
        - updated_at
      properties:
        id:
          type: string
        tenant_id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            type: string
    LegacyIngestEventResponse:
      type: object
      required:
        - dispatched
      properties:
        dispatched:
          type: integer
          description: Number of event-driven announcements dispatched.
    LegacyIngestEventRequest:
      type: object
      required:
        - event
      properties:
        event:
          type: string
          description: Partner event name.
          example: doorbell.pressed
        data:
          type: object
          additionalProperties: true
          description: Optional event payload data.
    PartnerEventOccurrence:
      type: object
      required:
        - occurrence_id
        - event_type
        - event_id
        - occurred_at
        - received_at
        - status
        - matched
        - dispatched
        - skipped
        - correlation_id
        - targets
      properties:
        occurrence_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_id:
          type: string
        ordering_key:
          type: string
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        correlation_id:
          type: string
        status:
          type: string
          enum:
            - processing
            - completed
            - partial
            - failed
            - rejected
            - stale_ordering
        matched:
          type: integer
          minimum: 0
        dispatched:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        completed_at:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PartnerEventTarget"
    PartnerEventTarget:
      type: object
      required:
        - announcement_id
        - device_id
        - output_id
        - message_id
        - status
      properties:
        announcement_id:
          type: string
        device_id:
          type: string
        output_id:
          type: string
        message_id:
          type: string
          format: uuid
        decision_id:
          type: string
        execution_id:
          type: string
        status:
          type: string
          enum:
            - reserved
            - queued
            - played
            - skipped
            - failed
        reason_code:
          type: string
    PartnerEventPublishResponse:
      type: object
      required:
        - occurrence_id
        - event_id
        - event_type
        - correlation_id
        - matched
        - dispatched
        - skipped
      properties:
        occurrence_id:
          type: string
          format: uuid
          description: Durable inbound occurrence identifier.
        event_id:
          type: string
          description: Trimmed partner event ID or the server-generated event ID.
        event_type:
          type: string
          description: Effective event type processed by the server.
        correlation_id:
          type: string
          description: Request correlation identifier for operational tracing.
        matched:
          type: integer
          minimum: 0
          description: Active announcements selected for the event type before condition evaluation.
        dispatched:
          type: integer
          minimum: 0
          description: Per-device output deliveries queued or synchronously published.
        skipped:
          type: integer
          minimum: 0
          description: Announcements or resolved deliveries skipped by conditions, readiness, failures, or playback-lane policy.
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PartnerEventTarget"
    PartnerEventPublishRequest:
      type: object
      required:
        - event_type
        - event_id
        - occurred_at
      properties:
        event_type:
          type: string
          minLength: 1
          description: Business event type used to select active event-driven announcements.
          example: bus.stop.approaching
        event_id:
          type: string
          minLength: 1
          description: Required partner-supplied event identifier, unique with event_type inside the tenant.
          example: bus-R12-MG_ROAD-20260710T083000Z
        occurred_at:
          type: string
          format: date-time
          description: Time the business event occurred at the source.
        data:
          type: object
          additionalProperties: true
          description: Business metadata used for stored event conditions. Top-level scalar fields are available to conditions; nested objects and arrays are ignored.
          example:
            route_id: R12
            stop_id: MG_ROAD
            direction: northbound
        interrupt_active:
          type: boolean
          default: false
          description: When true, allows this event delivery to interrupt active playback on the same device output lane.
    CreateWebhookResponse:
      type: object
      required:
        - webhook
        - secret
      properties:
        webhook:
          $ref: "#/components/schemas/Webhook"
        secret:
          type: string
          description: Signing secret returned only at creation time.
    CreateWebhookRequest:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
          example: https://partner.example.com/pitch/webhook
        events:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - play.completed
            - device.offline
    WebhookListResponse:
      type: object
      required:
        - webhooks
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/Webhook"
    DeliveryTimelineListResponse:
      type: object
      required:
        - deliveries
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryTimeline"
        total:
          type: integer
        cursor:
          type: string
    DeliveryTimeline:
      type: object
      required:
        - announcementId
        - deviceId
        - correlationId
        - status
        - events
      properties:
        announcementId:
          type: string
        deviceId:
          type: string
        outputId:
          type: string
          default: main
        correlationId:
          type: string
        status:
          type: string
          enum:
            - played
            - failed
            - pending
            - published
        events:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryEvent"
    DeliveryEvent:
      type: object
      required:
        - type
        - timestamp
        - detail
      properties:
        type:
          type: string
        timestamp:
          type: string
          format: date-time
        detail:
          type: string
    Device:
      type: object
      required:
        - id
        - tenant_id
        - name
        - output_mode
        - status
        - created_at
        - updated_at
        - timezone
        - version
      properties:
        id:
          type: string
          example: spa_console_001
        tenant_id:
          type: string
          example: tenant_console
        name:
          type: string
          example: Platform Gate Speaker
        group_id:
          type: string
          example: platform-1
        output_mode:
          type: string
          enum:
            - i2s
            - bluetooth
            - lineout
        audio_outputs:
          type: array
          description: Audio output slots under this physical device. The main slot is the compatibility default when old requests or schedules provide device_id without output_id.
          items:
            $ref: "#/components/schemas/AudioOutputSlot"
        status:
          type: string
          enum:
            - online
            - offline
            - playing
        last_seen:
          type: string
          format: date-time
          nullable: true
        firmware_version:
          type: string
        connectivity_type:
          type: string
        sd_free_bytes:
          type: integer
          format: int64
        board_profile:
          type: string
        storage_kind:
          type: string
        storage_free_bytes:
          type: integer
          format: int64
        storage_capacity_bytes:
          type: integer
          format: int64
        storage_missing:
          type: boolean
        indexed_asset_count:
          type: integer
          format: int64
        partial_cache_asset_count:
          type: integer
          format: int64
        partial_cache_bytes:
          type: integer
          format: int64
        partial_cache_expected_bytes:
          type: integer
          format: int64
        cache_status:
          type: string
        cache_reason:
          type: string
        cache_content_key:
          type: string
        cache_bytes_done:
          type: integer
          format: int64
        cache_total_bytes:
          type: integer
          format: int64
        cache_spool_bytes:
          type: integer
          format: int64
        cache_defer_count:
          type: integer
          format: int64
        cache_spool_enabled:
          type: boolean
        pending_proof_log_count:
          type: integer
          format: int64
        last_sd_mount_error:
          type: integer
          format: int64
        reset_reason:
          type: integer
          format: int64
        reset_reason_name:
          type: string
        content_readiness:
          type: string
        manifest_id:
          type: string
        max_audio_bytes:
          type: integer
          format: int64
        max_duration_ms:
          type: integer
          format: int64
        max_cache_asset_bytes:
          type: integer
          format: int64
        supports_offline_schedule:
          type: boolean
        supports_schedule_delay_ms:
          type: boolean
        supports_background_cache:
          type: boolean
        supports_schedule_catalog_v2:
          type: boolean
        supports_schedule_rules_v3:
          type: boolean
        schedule_catalog_max_pages:
          type: integer
          format: int64
        schedule_ram_due_entries:
          type: integer
          format: int64
        schedule_max_page_bytes:
          type: integer
          format: int64
        desired_config:
          type: object
          additionalProperties: true
        reported_config:
          type: object
          additionalProperties: true
        desired_shadow_version:
          type: integer
          format: int64
        desired_shadow_hash:
          type: string
        desired_shadow_bytes:
          type: integer
        desired_shadow_updated_at:
          type: string
          format: date-time
          nullable: true
        last_delta_published_at:
          type: string
          format: date-time
          nullable: true
        last_snapshot_fetched_at:
          type: string
          format: date-time
          nullable: true
        timezone:
          type: string
          example: Asia/Kolkata
        version:
          type: integer
        created_by:
          type: string
        updated_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    AudioOutputSlot:
      type: object
      description: Child audio output target on a physical device. The durable identity is tenant_id, device_id, and output_id; when a request names device_id without output_id, the backend treats it as the main output slot.
      required:
        - id
        - enabled
        - ready
        - supports_independent_playback
        - playback_active
      properties:
        id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          example: main
        label:
          type: string
          example: Lobby speakers
        role:
          type: string
          example: lineout_main
        chip:
          type: string
          example: pcm5102
        output_mode:
          type: string
          example: i2s
        enabled:
          type: boolean
        ready:
          type: boolean
        supports_independent_playback:
          type: boolean
        supports_parallel_cached_playback:
          type: boolean
        supports_parallel_mixed_playback:
          type: boolean
        supports_parallel_live_playback:
          type: boolean
        volume:
          type: integer
          minimum: 0
          maximum: 100
        playback_active:
          type: boolean
        reported:
          type: object
          additionalProperties: true
        reported_present:
          type: boolean
        last_reported_at:
          type: string
          format: date-time
          nullable: true
        targetable:
          type: boolean
        available:
          type: boolean
        availability_reason:
          type: string
          enum:
            - output_not_reported
            - output_disabled
            - device_offline
            - capability_stale
            - output_not_ready
    TargetBinding:
      type: object
      required:
        - namespace
        - external_id
        - zone_id
        - version
        - created_by
        - created_at
        - updated_at
      properties:
        namespace:
          type: string
        external_id:
          type: string
        zone_id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OutputZonePreflightResponse:
      type: object
      required:
        - allowed
        - zone_id
        - version
        - target_hash
        - total
        - ready
        - blocked
        - targets
      properties:
        allowed:
          type: boolean
        zone_id:
          type: string
          format: uuid
        version:
          type: integer
          format: int64
        target_hash:
          type: string
        total:
          type: integer
        ready:
          type: integer
        blocked:
          type: integer
        targets:
          type: array
          items:
            type: object
            required:
              - device_id
              - output_id
              - ready
              - observed_at
              - source_mode
              - available
            properties:
              device_id:
                type: string
              output_id:
                type: string
              ready:
                type: boolean
              reason:
                type: string
              observed_at:
                type: string
                format: date-time
              last_reported_at:
                type: string
                format: date-time
              source_mode:
                type: string
              available:
                type: boolean
              time_synced:
                type: boolean
              supports_parallel_cached_playback:
                type: boolean
              supports_parallel_mixed_playback:
                type: boolean
              supports_parallel_live_playback:
                type: boolean
    OutputZonePreflightRequest:
      type: object
      additionalProperties: false
      required:
        - intent
      properties:
        intent:
          type: string
          enum:
            - instant
            - event
            - control
            - schedule_authoring
            - schedule_activation
        expected_zone_version:
          type: integer
          format: int64
        expected_target_count:
          type: integer
          minimum: 1
          maximum: 500
        content_config:
          type: object
          additionalProperties: true
        allow_partial:
          type: boolean
          default: false
          description: Honored only for normal instant/event fan-out; controls remain atomic.
    OutputZone:
      type: object
      required:
        - zone_id
        - name
        - version
        - target_hash
        - members
        - availability
        - created_by
        - created_at
        - updated_at
      properties:
        zone_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        version:
          type: integer
          format: int64
          minimum: 1
        target_hash:
          type: string
          pattern: ^[0-9a-f]{64}$
        members:
          type: array
          maxItems: 500
          items:
            $ref: "#/components/schemas/OutputZoneMember"
        availability:
          type: object
          required:
            - ready
            - blocked
          properties:
            ready:
              type: integer
            blocked:
              type: integer
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OutputZoneMember:
      type: object
      additionalProperties: false
      required:
        - device_id
        - output_id
      properties:
        device_id:
          type: string
          minLength: 1
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
    UpdateOutputZoneRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
    CreateOutputZoneRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - members
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        members:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/OutputZoneMember"
    OutputZoneList:
      type: object
      required:
        - zones
      properties:
        zones:
          type: array
          items:
            $ref: "#/components/schemas/OutputZone"
        cursor:
          type: string
    TargetPreflightResponse:
      type: object
      required:
        - allowed
        - results
      properties:
        allowed:
          type: boolean
        results:
          type: array
          items:
            $ref: "#/components/schemas/TargetPreflightResult"
    TargetPreflightResult:
      type: object
      required:
        - device_id
        - output_id
        - allowed
        - available
        - delivery_mode
        - supports_parallel_cached_playback
        - supports_parallel_mixed_playback
        - supports_parallel_live_playback
      properties:
        device_id:
          type: string
        output_id:
          type: string
        allowed:
          type: boolean
        reason:
          type: string
          enum:
            - invalid_target
            - output_not_reported
            - output_disabled
            - device_offline
            - capability_stale
            - output_not_ready
            - shared_transport_busy
            - content_mode_unknown
        warning:
          type: string
        available:
          type: boolean
        last_reported_at:
          type: string
          format: date-time
          nullable: true
        delivery_mode:
          type: string
          enum:
            - cached
            - live
            - unknown
        supports_parallel_cached_playback:
          type: boolean
        supports_parallel_mixed_playback:
          type: boolean
        supports_parallel_live_playback:
          type: boolean
    TargetPreflightRequest:
      type: object
      required:
        - intent
        - targets
      properties:
        intent:
          type: string
          enum:
            - instant
            - event
            - control
            - schedule_authoring
            - schedule_activation
        targets:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/OutputTarget"
        content_config:
          type: object
          additionalProperties: true
  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor from the previous response.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum number of items to return.
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]{1,128}$
        maxLength: 128
      description: PITCH device identifier.
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PITCH JWT
      description: PITCH access JWT containing user, tenant, and tenant-role claims.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Pitch-Key
      description: PITCH partner API key. The legacy X-SmartPA-Key alias remains accepted during the compatibility window.

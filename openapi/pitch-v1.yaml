        stopped_message_id:
          type: string
        reason:
          type: string
        published_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        proof_at:
          type: string
          format: date-time
        announcement_id:
          type: string
        message_id:
          type: string
        decision_id:
          type: string

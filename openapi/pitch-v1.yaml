      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
    CreateOutputZoneRequest:
      type: object
      additionalProperties: false
      required:
        - name
        - members
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        members:
          type: array
          minItems: 1
          maxItems: 500
          items:
            $ref: "#/components/schemas/OutputZoneMember"
    OutputZoneList:
      type: object
      required:

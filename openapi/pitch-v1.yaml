        effective_occurrence_at:
          type: string
          format: date-time
          description: Original occurrence timestamp required for this_occurrence and this_and_following.
        replacement_fire_at:
          type: string
          format: date-time
          description: Replacement timestamp for this_occurrence. Target, type, priority, and lane remain unchanged.
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings decision; required to apply schedule updates with warning conflicts.

openapi: 3.0.3
info:
  title: PITCH Partner API
  version: 1.0.0
  description: Stable additive-only PITCH Partner API v1 contract. New integrations use X-Pitch-* HTTP headers; legacy X-SmartPA-* aliases remain accepted or emitted during the compatibility window. Breaking request, response, or security changes require a new API version.
servers:
  - url: https://pitch.knownsense.ai
    description: Production
security:
  - apiKeyAuth: []
  - bearerAuth: []
paths:
  /v1/tts/compose:
    post:
      operationId: composeTTS
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Compose TTS script
      description: Converts a business intent into reviewable speakable text and supported voice controls. The response includes validation issues and warnings so callers can approve text before synthesis. This non-idempotent composition request is not retried by the SDK.
      tags:
        - TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSComposeRequest"
      responses:
        "200":
          description: TTS composition generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSComposeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Composer request body exceeds the server cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Prompt or generated text violates TTS content policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          description: Composition was unavailable or returned an invalid response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/generate:
    post:
      operationId: generateTTSPreview
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Generate TTS preview
      description: Synthesizes reviewed text into a temporary audio preview. Requires the tts:compose API-key scope. Character usage is billed and rate-limited through the same PITCH voice path used by audio-library saves.
      tags:
        - TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSPreviewRequest"
      responses:
        "200":
          description: TTS preview generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSPreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: TTS request body exceeds the server cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: TTS text violates content policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/compose-batch:
    post:
      operationId: composeTTSBatch
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Compose multilingual TTS scripts
      description: Adapts one reviewed intent into speakable scripts for up to five languages. Each returned item must be reviewed independently before preview or save. This non-idempotent composition request is not retried by the SDK.
      tags:
        - TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSBatchComposeRequest"
      responses:
        "200":
          description: Batch TTS composition generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSBatchComposeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Batch composition body exceeds the server cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: One or more requested scripts violate content policy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/generate-batch:
    post:
      operationId: generateTTSPreviewBatch
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Generate multilingual TTS previews
      description: Synthesizes up to five reviewed scripts as billable previews. Per-item failures are returned alongside successful items; this non-idempotent request is not retried by the SDK.
      tags:
        - TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSBatchPreviewRequest"
      responses:
        "200":
          description: Batch TTS previews generated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSBatchPreviewResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Batch preview body exceeds the server cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: One or more preview items fail structured validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/pronunciation:
    get:
      operationId: getTTSPronunciation
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Get pronunciation preferences
      description: Returns customer-managed pronunciation terms, available templates, and enabled-term limits. The response omits internal synchronization details.
      tags:
        - TTS
      responses:
        "200":
          description: Pronunciation preferences and limits.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSPronunciationSummary"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/pronunciation/terms:
    put:
      operationId: upsertTTSPronunciationTerm
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Add or update a pronunciation term
      description: Saves one customer-reviewed pronunciation term and returns the updated summary. This non-idempotent write is not retried by the SDK.
      tags:
        - TTS
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSPronunciationTermRequest"
      responses:
        "200":
          description: Updated pronunciation summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSPronunciationSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    delete:
      operationId: deleteTTSPronunciationTerm
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Delete a pronunciation term
      description: Deletes one term selected by exact language and word query values and returns the updated summary. This non-idempotent write is not retried by the SDK.
      tags:
        - TTS
      parameters:
        - name: language
          in: query
          required: true
          schema:
            type: string
        - name: word
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated pronunciation summary.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSPronunciationSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/tts/pronunciation/templates/{industry}/apply:
    post:
      operationId: applyTTSPronunciationTemplate
      x-pitch-partner: true
      x-pitch-scope:
        - tts:compose
      x-pitch-idempotency: none
      summary: Apply an approved pronunciation template
      description: Applies an available template within the enabled-term limit and returns inserted and skipped counts. This non-idempotent write is not retried by the SDK.
      tags:
        - TTS
      parameters:
        - name: industry
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated pronunciation summary with apply counts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSPronunciationApplyResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/audio:
    get:
      operationId: listAudioAssets
      x-pitch-partner: true
      x-pitch-scope:
        - audio:read
      x-pitch-idempotency: none
      summary: List audio assets
      description: Lists customer-owned audio assets. Requires the audio:read API-key scope. Omit folder_id to list all assets, use folder_id=root for library-root assets, or pass a folder id for one folder.
      tags:
        - Audio
      parameters:
        - name: folder_id
          in: query
          schema:
            type: string
          description: Folder id to scope results, or root for the library root. Omit to list all assets.
        - name: search
          in: query
          schema:
            type: string
          description: Case-insensitive name search.
        - name: language
          in: query
          schema:
            type: string
        - name: source
          in: query
          schema:
            type: string
            enum:
              - upload
              - tts
              - recording
          description: Optional asset-origin filter.
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Audio assets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: uploadAudioAsset
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Upload audio asset
      description: Uploads one non-empty audio file of at most 25 MiB (26,214,400 bytes) and saves it as a customer-owned library asset. The complete multipart request is capped at 26 MiB. Requires the audio:write API-key scope. Metadata is provided as a JSON string in the metadata multipart field.
      tags:
        - Audio
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
                - metadata
              properties:
                file:
                  type: string
                  format: binary
                  description: Non-empty audio file, at most 25 MiB (26,214,400 bytes).
                metadata:
                  type: string
                  description: JSON string matching AudioUploadMetadata, including optional folder_id.
                  x-pitch-json-schema:
                    $ref: "#/components/schemas/AudioUploadMetadata"
      responses:
        "201":
          description: Audio asset uploaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioAsset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: File exceeds 25 MiB or the complete multipart request exceeds 26 MiB.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/from-tts:
    post:
      operationId: createAudioFromTTS
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Save TTS audio asset
      description: Generates reviewed text as speech and saves it directly into the customer audio library, optionally inside a folder. Requires the audio:write API-key scope.
      tags:
        - Audio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSSaveRequest"
      responses:
        "201":
          description: TTS audio asset created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioAsset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: TTS body is too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/audio/folders:
    get:
      operationId: listAudioFolders
      x-pitch-partner: true
      x-pitch-scope:
        - audio:read
      x-pitch-idempotency: none
      summary: List audio folders
      description: Returns direct child folders under the requested parent plus breadcrumbs for the selected parent. Use parent_id=root or omit parent_id for root folders.
      tags:
        - Audio
      parameters:
        - name: parent_id
          in: query
          schema:
            type: string
            default: root
          description: Parent folder id, or root for top-level folders.
      responses:
        "200":
          description: Audio folder children and breadcrumbs.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFolderListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createAudioFolder
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Create audio folder
      description: Creates a customer audio-library folder. Sibling names are unique case-insensitively within the same parent. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAudioFolderRequest"
      responses:
        "201":
          description: Audio folder created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/folders/tree:
    get:
      operationId: listAudioFolderTree
      x-pitch-partner: true
      x-pitch-scope:
        - audio:read
      x-pitch-idempotency: none
      summary: List audio folder tree
      description: Returns up to 500 active folders for target pickers. Use search to find folders outside the first page when truncated is true.
      tags:
        - Audio
      parameters:
        - name: search
          in: query
          schema:
            type: string
          description: Case-insensitive folder-name search across the tenant.
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 500
      responses:
        "200":
          description: Audio folder tree.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFolderTreeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/folders/{folderId}:
    patch:
      operationId: renameAudioFolder
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Rename audio folder
      description: Renames an existing customer audio folder. Moving folders is not supported. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAudioFolderRequest"
      responses:
        "200":
          description: Audio folder renamed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioFolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteAudioFolder
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Delete audio folder
      description: Deletes an empty customer audio folder. Folders containing child folders or audio assets return 409. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      responses:
        "204":
          description: Audio folder deleted.
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/from-tts-batch:
    post:
      operationId: createAudioFromTTSBatch
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Save multilingual TTS assets
      description: Saves up to five billable audio assets and optionally one merged multilingual asset with a configurable silence gap. A 207 response reports partial success. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TTSBatchSaveRequest"
      responses:
        "201":
          description: Batch TTS assets created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSBatchSaveResponse"
        "207":
          description: Partial batch success with per-item errors.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TTSBatchSaveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          description: Batch save body exceeds the server cap.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: One or more items fail structured validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/audio/{id}/move:
    post:
      operationId: moveAudioAsset
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Move audio asset
      description: Changes only the folder reference for an audio asset; schedules and playback content are unchanged. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MoveAudioAssetRequest"
      responses:
        "200":
          description: Audio asset moved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioAsset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/{id}/copy:
    post:
      operationId: copyAudioAsset
      x-pitch-partner: true
      x-pitch-scope:
        - audio:write
      x-pitch-idempotency: none
      summary: Copy audio asset
      description: Creates a new library asset in the target folder with a new stable asset id while reusing the approved source audio. This non-idempotent write is not retried by the SDK.
      tags:
        - Audio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CopyAudioAssetRequest"
      responses:
        "201":
          description: Audio asset copied.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AudioAsset"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/audio/{id}:
    get:
      operationId: getAudioAsset
      x-pitch-partner: true
      x-pitch-scope:
        - audio:read
      x-pitch-idempotency: none
      summary: Get audio asset
      description: Returns one customer audio asset by stable asset id.
      tags:
        - Audio
      parameters:
        - name: id
          in: path
          required: true
          schema:

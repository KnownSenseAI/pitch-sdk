      x-pitch-idempotency: none
      summary: Activate an announcement
      description: Activates a draft or pending-review announcement and schedules durable trigger types when scheduling dependencies are configured.
      tags:
        - Announcements
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: string
      security:
        - apiKeyAuth: []
        - bearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnnouncementActivationRequest"
      responses:
        "200":
          description: Announcement activated.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    enum:
                      - active

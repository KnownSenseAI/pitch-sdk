openapi: 3.0.3
info:
  title: PITCH Partner API
  version: 1.0.0
  description: Stable additive-only PITCH Partner API v1 contract. New integrations use X-Pitch-* HTTP headers; legacy X-SmartPA-* aliases remain accepted or emitted during the compatibility window. Breaking request, response, or security changes require a new API version.
servers:
  - url: https://pitch.knownsense.ai
    description: Production
security:
  - bearerAuth: []
  - apiKeyAuth: []
paths:
  /v1/devices:
    get:
      operationId: listDevices
      x-pitch-partner: true
      x-pitch-scope:
        - devices:read
      x-pitch-idempotency: none
      summary: List tenant devices and authoritative audio outputs
      description: Requires JWT role or API key scope devices:read. Results are cursor paginated and may be filtered by status, group_id, and search.
      tags:
        - Devices
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - online
              - offline
              - playing
        - name: group_id
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: output_id
          in: query
          schema:
            type: string
          description: Keep devices exposing this normalized output slot.
        - name: output_available
          in: query
          schema:
            type: boolean
          description: Keep devices with a matching currently available output.
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Tenant device page.
          content:
            application/json:
              schema:
                type: object
                required:
                  - devices
                  - total
                  - cursor
                properties:
                  devices:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"
                  total:
                    type: integer
                  cursor:
                    type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/targets/preflight:
    post:
      operationId: preflightTargets
      x-pitch-partner: true
      x-pitch-scope:
        - devices:read
      x-pitch-idempotency: none
      summary: Check target structure, readiness, freshness, and concurrency facts
      description: Side-effect-free; it never reserves a playback claim. Requires devices:read. A syntactically valid blocked request returns 200 with allowed false.
      tags:
        - Devices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TargetPreflightRequest"
      responses:
        "200":
          description: Per-target preflight decision.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetPreflightResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/zones:
    get:
      operationId: listOutputZones
      x-pitch-partner: true
      x-pitch-scope:
        - zones:read
      x-pitch-idempotency: none
      summary: List tenant output zones
      description: Requires zones:read. Members are stable-sorted explicit device/output pairs.
      tags:
        - Zones
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Zone page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZoneList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
    post:
      operationId: createOutputZone
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      summary: Create a versioned output zone
      description: Requires zones:write. Every member must explicitly include output_id.
      tags:
        - Zones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutputZoneRequest"
      responses:
        "201":
          description: Created zone
          headers:
            ETag:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZone"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Active name conflict.
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/zones/{zoneId}:
    get:
      operationId: getOutputZone
      x-pitch-partner: true
      x-pitch-scope:
        - zones:read
      x-pitch-idempotency: none
      tags:
        - Zones
      responses:
        "200":
          description: Zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZone"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Zone not found.
        "429":
          $ref: "#/components/responses/RateLimited"
    patch:
      operationId: updateOutputZone
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      tags:
        - Zones
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOutputZoneRequest"
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZone"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          description: Version conflict.
        "428":
          description: If-Match required.
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: deleteOutputZone
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      tags:
        - Zones
      parameters:
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Zone soft-deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Zone is in use.
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/zones/{zoneId}/members:
    put:
      operationId: replaceOutputZoneMembers
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      tags:
        - Zones
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: If-Match
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - members
              properties:
                members:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items:
                    $ref: "#/components/schemas/OutputZoneMember"
      responses:
        "200":
          description: Updated zone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZone"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "412":
          description: Version conflict.
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/zones/{zoneId}/preflight:
    post:
      operationId: preflightOutputZone
      x-pitch-partner: true
      x-pitch-scope:
        - zones:read
      x-pitch-idempotency: none
      tags:
        - Zones
      parameters:
        - name: zoneId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OutputZonePreflightRequest"
      responses:
        "200":
          description: Side-effect-free readiness receipt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputZonePreflightResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/target-bindings/{namespace}/{externalId}:
    put:
      operationId: putTargetBinding
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      tags:
        - Zones
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - zone_id
              properties:
                zone_id:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetBinding"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
    get:
      operationId: getTargetBinding
      x-pitch-partner: true
      x-pitch-scope:
        - zones:read
      x-pitch-idempotency: none
      tags:
        - Zones
      responses:
        "200":
          description: Binding
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TargetBinding"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Not found.
        "429":
          $ref: "#/components/responses/RateLimited"
    delete:
      operationId: deleteTargetBinding
      x-pitch-partner: true
      x-pitch-scope:
        - zones:write
      x-pitch-idempotency: none
      tags:
        - Zones
      responses:
        "204":
          description: Binding soft-deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/logs/deliveries/trace/{correlationId}:
    get:
      operationId: getDeliveryTrace
      x-pitch-partner: true
      x-pitch-scope:
        - logs:read
      x-pitch-idempotency: none
      summary: Get output-aware delivery lifecycle trace
      description: Requires logs:read and returns routed, received, started, terminal, failure, and replay events in time order.
      tags:
        - Logs
      parameters:
        - name: correlationId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Correlated delivery events, including deviceId, outputId, msgId, type, detail, and timestamp.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/devices/{deviceId}:
    get:
      operationId: getDevice
      x-pitch-partner: true
      x-pitch-scope:
        - devices:read
      x-pitch-idempotency: none
      summary: Get device
      description: Returns one tenant-scoped device snapshot from the durable registry.
      tags:
        - Devices
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "200":
          description: Device found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Device"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/logs/deliveries:
    get:
      operationId: listDeliveryLogs
      x-pitch-partner: true
      x-pitch-scope:
        - logs:read
      x-pitch-idempotency: none
      summary: List announcement delivery timelines
      description: Returns tenant-scoped proof-of-play delivery timelines, newest first.
      tags:
        - Logs
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: device_id
          in: query
          schema:
            type: string
        - name: output_id
          in: query
          description: Normalized audio output lane; omitted means all lanes.
          schema:
            type: string
        - name: correlation_id
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - played
              - failed
              - pending
              - published
      responses:
        "200":
          description: Delivery timelines.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryTimelineListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/webhooks:
    get:
      operationId: listWebhooks
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: List webhooks
      description: Lists tenant-owned webhook endpoints. Requires a PITCH JWT for an owner or admin; partner API keys cannot manage webhook configuration.
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tenant webhooks.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createWebhook
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Create webhook
      description: Creates a tenant-owned webhook endpoint for an owner or admin and returns the signing secret once. Production URLs must use public HTTPS.
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWebhookRequest"
      responses:
        "201":
          description: Webhook created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateWebhookResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/events:
    post:
      operationId: publishEvent
      x-pitch-partner: true
      x-pitch-scope:
        - announce:write
      x-pitch-idempotency: required
      summary: Publish a partner business event
      description: Publishes a meaningful business event for event-driven announcements. Partners should convert GPS or sensor streams into business events before calling this API; PITCH does not accept raw GPS traces here.
      tags:
        - Events
      security:
        - apiKeyAuth: []
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            minLength: 1
          description: Client-generated idempotency key for safely retrying event publication. SDKs should use event_id when supplied.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerEventPublishRequest"
            examples:
              busStopApproaching:
                summary: Bus approaching a stop
                value:
                  event_type: bus.stop.approaching
                  event_id: bus-R12-MG_ROAD-20260710T083000Z
                  occurred_at: 2026-07-10T08:30:00Z
                  data:
                    route_id: R12
                    stop_id: MG_ROAD
                    direction: northbound
                  interrupt_active: false
      responses:
        "200":
          description: Event processed for matching announcements.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerEventPublishResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/event-occurrences:
    get:
      operationId: listEventOccurrences
      x-pitch-partner: true
      x-pitch-scope:
        - logs:read
      x-pitch-idempotency: none
      summary: List durable partner event occurrences
      description: Returns tenant-scoped event outcomes. Raw GPS traces are not accepted or returned.
      tags:
        - Events
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: event_type
          in: query
          schema:
            type: string
        - name: event_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Durable event occurrences.
          content:
            application/json:
              schema:
                type: object
                required:
                  - occurrences
                properties:
                  occurrences:
                    type: array
                    items:
                      $ref: "#/components/schemas/PartnerEventOccurrence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/event-occurrences/{occurrenceId}:
    get:
      operationId: getEventOccurrence
      x-pitch-partner: true
      x-pitch-scope:
        - logs:read
      x-pitch-idempotency: none
      summary: Get a durable partner event occurrence
      tags:
        - Events
      security:
        - bearerAuth: []
        - apiKeyAuth: []
      parameters:
        - name: occurrenceId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Durable event occurrence and per-output targets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerEventOccurrence"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/webhooks/ingest:
    post:
      operationId: ingestLegacyWebhookEvent
      x-pitch-partner: true
      x-pitch-scope:
        - announce:write
      x-pitch-idempotency: optional
      deprecated: true
      summary: Ingest legacy partner event
      description: Legacy alias for partner event ingestion. New integrations should use POST /v1/events with event_type.
      tags:
        - Events
      security:
        - apiKeyAuth: []
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: false
          schema:
            type: string
            minLength: 1
          description: Client-generated idempotency key for safely retrying legacy event ingestion. Omitting it is supported for compatibility but is unsafe to replay.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LegacyIngestEventRequest"
      responses:
        "200":
          description: Legacy event ingested.
          headers:
            X-Pitch-Deprecated:
              schema:
                type: string
              description: Identifies the supported replacement, POST /v1/events.
            X-SmartPA-Deprecated:
              schema:
                type: string
              deprecated: true
              description: Legacy alias for X-Pitch-Deprecated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyIngestEventResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/webhooks/{id}:
    patch:
      operationId: updateWebhook
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Update webhook
      description: Updates webhook URL or subscribed event types. Requires an owner or admin PITCH JWT.
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWebhookRequest"
      responses:
        "200":
          description: Webhook updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteWebhook
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Delete webhook
      description: Soft-deletes a tenant-owned webhook endpoint. Requires an owner or admin PITCH JWT.
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Webhook deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/webhooks/{id}/deliveries:
    get:
      operationId: listWebhookDeliveries
      x-pitch-partner: true
      x-pitch-scope:
        - logs:read
      x-pitch-idempotency: none
      summary: List webhook deliveries
      description: Lists delivery attempts for one webhook. Console users can read this with PITCH JWT auth; partner API keys need logs:read.
      tags:
        - Webhooks
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Webhook delivery attempts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookDeliveriesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
  /v1/webhooks/{id}/rotate-secret:
    post:
      operationId: rotateWebhookSecret
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Rotate webhook signing secret

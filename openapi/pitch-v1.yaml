          type: string
          format: date-time
    UpdateScheduleRequest:
      type: object
      x-examples:
        retargetAuxToMain:
          summary: Move an active schedule from aux to main
          value:
            targeting_config:
              type: device
              targets:
                - device_id: spa-101
                  output_id: main
            priority: 2
        splitAndRetargetFollowing:
          summary: Keep earlier occurrences unchanged and retarget this and following
          value:
            edit_scope: this_and_following
            effective_occurrence_at: 2026-07-20T09:00:00Z
            targeting_config:
              type: device
              targets:
                - device_id: spa-202
                  output_id: aux
            priority: 3
      properties:
        name:
          type: string
          maxLength: 60

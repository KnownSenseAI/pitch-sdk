          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateWebhookRequest:
      type: object
      properties:
        url:
          type: string
          format: uri
        events:
          type: array
          minItems: 1
          items:
            type: string
    LegacyIngestEventResponse:
      type: object
      required:
        - dispatched

          type: string
          description: Audio folder id. Omitted when the asset is in the library root.
        checksum:
          type: string
        duration_ms:
          type: integer
        format:
          type: string
          example: opus
        sample_rate_hz:
          type: integer
          example: 48000
        channels:
          type: integer
          example: 1
        size_bytes:
          type: integer
          format: int64
        language:
          type: string
        tags:
          type: array
          items:
            type: string
        lifecycle:
          type: string
          enum:
            - permanent
            - temporary
        usage_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AudioTTSRevisionResult:

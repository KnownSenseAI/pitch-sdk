          type: array
          items:
            $ref: "#/components/schemas/AudioAsset"
        errors:
          type: array
          items:
            $ref: "#/components/schemas/BulkAudioUploadError"
        total:
          type: integer
          example: 3
        succeeded:
          type: integer
          example: 2
        failed:
          type: integer
          example: 1

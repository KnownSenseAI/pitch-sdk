          description: Partner event name.
          example: doorbell.pressed
        data:
          type: object
          additionalProperties: true
          description: Optional event payload data.
    PartnerEventOccurrence:
      type: object
      required:
        - occurrence_id
        - event_type
        - event_id
        - occurred_at
        - received_at
        - status
        - matched
        - dispatched
        - skipped
        - correlation_id
        - targets
      properties:
        occurrence_id:
          type: string
          format: uuid
        event_type:
          type: string
        event_id:
          type: string
        ordering_key:
          type: string
        occurred_at:
          type: string
          format: date-time
        received_at:
          type: string
          format: date-time
        correlation_id:
          type: string
        status:
          type: string
          enum:
            - processing
            - completed
            - partial
            - failed
            - rejected
            - stale_ordering
        matched:
          type: integer
          minimum: 0
        dispatched:
          type: integer
          minimum: 0
        skipped:
          type: integer
          minimum: 0
        completed_at:
          type: string
          format: date-time
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PartnerEventTarget"
    PartnerEventTarget:
      type: object
      required:
        - announcement_id
        - device_id
        - output_id
        - message_id
        - status
      properties:
        announcement_id:
          type: string
        device_id:
          type: string
        output_id:
          type: string
        message_id:
          type: string
          format: uuid
        decision_id:
          type: string
        execution_id:
          type: string
        status:
          type: string
          enum:
            - reserved
            - queued
            - played
            - skipped
            - failed
        reason_code:
          type: string
    PartnerEventPublishResponse:
      type: object
      required:
        - occurrence_id
        - event_id
        - event_type
        - correlation_id
        - matched
        - dispatched
        - skipped
      properties:
        occurrence_id:
          type: string
          format: uuid
          description: Durable inbound occurrence identifier.
        event_id:
          type: string
          description: Trimmed partner event ID or the server-generated event ID.
        event_type:
          type: string
          description: Effective event type processed by the server.
        correlation_id:
          type: string
          description: Request correlation identifier for operational tracing.
        matched:
          type: integer
          minimum: 0
          description: Active announcements selected for the event type before condition evaluation.
        dispatched:
          type: integer
          minimum: 0
          description: Per-device output deliveries queued or synchronously published.
        skipped:
          type: integer
          minimum: 0
          description: Announcements or resolved deliveries skipped by conditions, readiness, failures, or playback-lane policy.
        targets:
          type: array
          items:
            $ref: "#/components/schemas/PartnerEventTarget"
    PartnerEventPublishRequest:
      type: object
      required:
        - event_type
        - event_id
        - occurred_at
      properties:
        event_type:
          type: string
          minLength: 1
          description: Business event type used to select active event-driven announcements.
          example: bus.stop.approaching
        event_id:
          type: string
          minLength: 1
          description: Required partner-supplied event identifier, unique with event_type for the customer.
          example: bus-R12-MG_ROAD-20260710T083000Z
        occurred_at:
          type: string
          format: date-time
          description: Time the business event occurred at the source.
        data:
          type: object
          additionalProperties: true
          description: Business metadata used for stored event conditions. Top-level scalar fields are available to conditions; nested objects and arrays are ignored.
          example:
            route_id: R12
            stop_id: MG_ROAD
            direction: northbound
        interrupt_active:
          type: boolean
          default: false
          description: When true, allows this event delivery to interrupt active playback on the same device output lane.
    CreateWebhookResponse:
      type: object
      required:
        - webhook
        - secret
      properties:
        webhook:
          $ref: "#/components/schemas/Webhook"
        secret:
          type: string
          description: Signing secret returned only at creation time.
    CreateWebhookRequest:
      type: object
      required:
        - url
        - events
      properties:
        url:
          type: string
          format: uri
          example: https://partner.example.com/pitch/webhook
        events:
          type: array
          minItems: 1
          items:
            type: string
          example:
            - play.completed
    WebhookListResponse:
      type: object
      required:
        - webhooks
      properties:
        webhooks:
          type: array
          items:
            $ref: "#/components/schemas/Webhook"
    DeliveryTimelineListResponse:
      type: object
      required:
        - deliveries
      properties:
        deliveries:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryTimeline"
        total:
          type: integer
        cursor:
          type: string
          description: Opaque next-page cursor; an empty or omitted value means there is no next page.
    DeliveryTimeline:
      type: object
      required:
        - announcementId
        - deviceId
        - msgId
        - correlationId
        - status
        - events
      properties:
        announcementId:
          type: string
        deviceId:
          type: string
        outputId:
          type: string
          default: main
        msgId:
          type: string
          minLength: 1
          description: Exact delivery message identifier; together with deviceId and outputId, identifies one delivery attempt.
        correlationId:
          type: string
        status:
          type: string
          enum:
            - played
            - failed
            - pending
            - published
            - received
            - started
        failureReason:
          type: string
          description: Customer-visible, product-neutral diagnostic text for a failed delivery; values are human-readable and are not a stable enum.
        events:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryEvent"
    DeliveryEvent:
      type: object
      required:
        - type
        - timestamp
        - detail
      properties:
        type:
          type: string
        timestamp:
          type: string
          format: date-time
        detail:
          type: string
          description: Human-readable context for this delivery event.
    Device:
      type: object
      required:
        - id
        - name
        - status
        - created_at
        - updated_at
        - timezone
        - version
      properties:
        id:
          type: string
          example: pitch_device_001
        name:
          type: string
          example: Platform Gate Speaker
        group_id:
          type: string
          example: platform-1
        audio_outputs:
          type: array
          description: Audio output slots under this physical device. The main slot is the compatibility default when old requests or schedules provide device_id without output_id.
          items:
            $ref: "#/components/schemas/AudioOutputSlot"
        status:
          type: string
          enum:
            - online
            - offline
            - playing
        last_seen:
          type: string
          format: date-time
          nullable: true
        firmware_version:
          type: string
        content_readiness:
          type: string
        timezone:
          type: string
          example: Asia/Kolkata
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AudioOutputSlot:
      type: object
      description: Child audio output target on a physical device. When a request names a device without output_id, the PITCH service targets the main output slot.
      required:
        - id
        - enabled
        - ready
        - supports_independent_playback
        - playback_active
      properties:
        id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          example: main
        label:
          type: string
          example: Lobby speakers
        enabled:
          type: boolean
        ready:
          type: boolean
        supports_independent_playback:
          type: boolean
        supports_parallel_cached_playback:
          type: boolean
        supports_parallel_mixed_playback:
          type: boolean
        supports_parallel_live_playback:
          type: boolean
        volume:
          type: integer
          minimum: 0
          maximum: 100
        playback_active:
          type: boolean
        last_reported_at:
          type: string
          format: date-time
          nullable: true
        targetable:
          type: boolean
        available:
          type: boolean
        availability_reason:
          type: string
          enum:
            - output_not_reported
            - output_disabled
            - device_offline
            - capability_stale
            - output_not_ready
    DeliveryTrace:
      type: object
      required:
        - correlationId
        - events
      properties:
        correlationId:
          type: string
          description: Correlation identifier supplied in the request path.
        events:
          type: array
          description: Delivery lifecycle events ordered by time.
          items:
            $ref: "#/components/schemas/DeliveryTraceEvent"
    DeliveryTraceEvent:
      type: object
      required:
        - deviceId
        - outputId
        - msgId
        - type
        - detail
        - timestamp
      properties:
        deviceId:
          type: string
        outputId:
          type: string
          default: main
        msgId:
          type: string
        announcementId:
          type: string
        type:
          type: string
        detail:
          type: string
        metadata:
          type: object
          additionalProperties: true
        timestamp:
          type: string
          format: date-time
    TargetBinding:
      type: object
      required:
        - namespace
        - external_id
        - zone_id
        - version
        - created_at
        - updated_at
      properties:
        namespace:
          type: string
        external_id:
          type: string
        zone_id:
          type: string
          format: uuid
        resolution_mode:
          type: string
          enum:
            - live_zone
            - pinned_snapshot

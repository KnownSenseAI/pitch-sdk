                    $ref: "#/components/schemas/DecisionPreviewSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "429":
          $ref: "#/components/responses/RateLimited"
        "500":
          $ref: "#/components/responses/InternalError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /v1/output-controls:
    post:
      operationId: createOutputControl
      x-pitch-partner: true
      x-pitch-scope:
        - outputs:control
      x-pitch-idempotency: required
      summary: Create an acknowledged output safety operation
      description: Requires outputs:control. Force, drain, all-output, and emergency playback additionally require emergency:write for API keys or an owner/admin user. Publication is nonterminal; inspect the operation until device ACK or playback proof completes it.
      tags:
        - Output Controls
      parameters:
        - name: X-Idempotency-Key
          in: header
          required: true
          schema:
            type: string
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOutputControlRequest"
      responses:
        "202":
          description: Accepted and published, but not necessarily acknowledged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputControlOperation"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency
          target freshness: null
          or control-state conflict.: null
        "429":
          $ref: "#/components/responses/RateLimited"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    get:
      operationId: listOutputControls
      x-pitch-partner: true
      x-pitch-scope:
        - outputs:read
      x-pitch-idempotency: none
      summary: List output controls
      tags:
        - Output Controls
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
      responses:
        "200":
          description: Tenant-scoped controls and target results.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputControlList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/output-controls/{controlId}:
    get:
      operationId: getOutputControl
      x-pitch-partner: true
      x-pitch-scope:
        - outputs:read
      x-pitch-idempotency: none
      summary: Get an output control and all snapshotted target results
      tags:
        - Output Controls
      parameters:
        - name: controlId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Output control detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutputControlOperation"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "429":
          $ref: "#/components/responses/RateLimited"
  /v1/speech-recipes:
    get:
      operationId: listSpeechRecipes
      x-pitch-partner: true
      x-pitch-scope: [tts:compose]
      x-pitch-idempotency: none
      summary: List immutable complete-utterance recipes
      description: Lists reviewed deterministic localized sentence recipes. Recipes synthesize complete utterances; spoken fragments are not a normal delivery unit.
      tags: [Speech]
      responses:
        "200": {description: Immutable recipe versions., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRecipeListResponse"}}}}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "429": {$ref: "#/components/responses/RateLimited"}
  /v1/speech-lexicon/{namespace}/{externalId}/{locale}:
    get:
      operationId: getSpeechLexicon
      x-pitch-partner: true
      x-pitch-scope: [tts:compose]
      x-pitch-idempotency: none
      summary: Resolve a place spoken form
      tags: [Speech]
      parameters:
        - {name: namespace, in: path, required: true, schema: {type: string}}
        - {name: externalId, in: path, required: true, schema: {type: string}}
        - {name: locale, in: path, required: true, schema: {type: string}, description: Normalized BCP-47 locale.}
      responses:
        "200": {description: Resolved tenant override or approved platform entry., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechLexiconResolution"}}}}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "429": {$ref: "#/components/responses/RateLimited"}
    put:
      operationId: putSpeechLexiconOverride
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Create an immutable tenant spoken-form revision
      tags: [Speech]
      parameters:
        - {name: namespace, in: path, required: true, schema: {type: string}}
        - {name: externalId, in: path, required: true, schema: {type: string}}
        - {name: locale, in: path, required: true, schema: {type: string}, description: Normalized BCP-47 locale.}
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/SpeechLexiconOverrideRequest"}}}}
      responses:
        "200": {description: Tenant override revision., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechLexiconEntry"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "429": {$ref: "#/components/responses/RateLimited"}
    delete:
      operationId: deleteSpeechLexiconOverride
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Revoke the active tenant spoken-form override
      tags: [Speech]
      parameters:
        - {name: namespace, in: path, required: true, schema: {type: string}}
        - {name: externalId, in: path, required: true, schema: {type: string}}
        - {name: locale, in: path, required: true, schema: {type: string}, description: Normalized BCP-47 locale.}
      responses:
        "204": {description: Override revoked; resolution falls back to the approved platform entry.}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "429": {$ref: "#/components/responses/RateLimited"}
  /v1/speech-renders/resolve:
    post:
      operationId: resolveSpeechRender
      x-pitch-partner: true
      x-pitch-scope: [audio:write]
      x-pitch-idempotency: required
      summary: Resolve or start an immutable complete-utterance render
      description: Scope is server-derived. Platform catalog access additionally requires the trusted Mobility workload, immutable use context, territory, active rights, kill switch, and exact audio review. SDKs never retry this operation automatically.
      tags: [Speech]
      parameters:
        - {name: X-Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 200}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenderResolveRequest"}}}}
      responses:
        "200": {description: Compatible reviewed rendition and customer-owned managed asset found., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenderOperation"}}}}
        "202": {description: Durable generation admitted., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenderOperation"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "429": {$ref: "#/components/responses/RateLimited"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
  /v1/speech-renders/{operationId}:
    get:
      operationId: getSpeechRenderOperation
      x-pitch-partner: true
      x-pitch-scope: [audio:write]
      x-pitch-idempotency: none
      summary: Poll a durable render operation
      description: Every response includes done. provider_outcome_unknown is terminal attention_required so clients stop polling and avoid an unaudited duplicate charge.
      tags: [Speech]
      parameters:
        - {name: operationId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        "200": {description: Current operation state., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenderOperation"}}}}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "429": {$ref: "#/components/responses/RateLimited"}
  /v1/speech-renditions/{renditionId}/acknowledge:
    post:
      operationId: acknowledgeSpeechRendition
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Acknowledge the exact heard rendition for this tenant
      tags: [Speech]
      parameters:
        - {name: renditionId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        "200": {description: Exact checksum acknowledged., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenditionReview"}}}}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "429": {$ref: "#/components/responses/RateLimited"}
  /v1/speech-renditions/{renditionId}/acknowledgement:
    delete:
      operationId: revokeSpeechRenditionAcknowledgement
      x-pitch-partner: true
      x-pitch-scope: []
      x-pitch-idempotency: none
      summary: Revoke an exact tenant acknowledgement
      description: Dependent managed definitions reject new event ingest before revocation returns; accepted proof remains immutable.
      tags: [Speech]
      parameters:
        - {name: renditionId, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        "200": {description: Acknowledgement revoked., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechRenditionReview"}}}}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "404": {$ref: "#/components/responses/NotFound"}
        "429": {$ref: "#/components/responses/RateLimited"}
  /v1/speech-delivery-assets/resolve:
    post:
      operationId: resolveSpeechDeliveryAsset
      x-pitch-partner: true
      x-pitch-scope: [audio:write]
      x-pitch-idempotency: required
      summary: Resolve a managed immutable delivery asset
      description: Accepts ordered reviewed complete-utterance renditions and optional approved non-speech cues. Fallback, expiring, unsafe-script, editable, URL, and speech-fragment inputs are rejected.
      tags: [Speech]
      parameters:
        - {name: X-Idempotency-Key, in: header, required: true, schema: {type: string, minLength: 1, maxLength: 200}}
      requestBody: {required: true, content: {application/json: {schema: {$ref: "#/components/schemas/SpeechDeliveryResolveRequest"}}}}
      responses:
        "200": {description: Deterministic managed delivery asset., content: {application/json: {schema: {$ref: "#/components/schemas/SpeechDeliveryAsset"}}}}
        "400": {$ref: "#/components/responses/BadRequest"}
        "401": {$ref: "#/components/responses/Unauthorized"}
        "403": {$ref: "#/components/responses/Forbidden"}
        "409": {$ref: "#/components/responses/Conflict"}
        "429": {$ref: "#/components/responses/RateLimited"}
        "503": {$ref: "#/components/responses/ServiceUnavailable"}
components:
  responses:
    RateLimited:
      description: The authenticated customer or client IP exceeded its configured per-minute quota.
      headers:
        Retry-After:
          description: Seconds until the current minute bucket resets.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated principal is not allowed to access the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required dependency is unavailable or not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state conflicts with the requested operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request syntax is valid, but the requested occurrence-scoped edit is unsupported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    SpeechRecipe:
      type: object
      required: [key, version, locale, template, required_slots, max_runes]
      properties:
        key: {type: string, enum: [next_stop, arriving_at, now_at, route_destination, please_alight]}
        version: {type: integer, minimum: 1}
        locale: {type: string}
        template: {type: string}
        required_slots: {type: array, items: {type: string}}
        max_runes: {type: integer, minimum: 1}
    SpeechRecipeListResponse:
      type: object
      required: [recipes]
      properties:
        recipes: {type: array, items: {$ref: "#/components/schemas/SpeechRecipe"}}
    SpeechLexiconEntry:
      type: object
      required: [id, scope, namespace, external_id, locale, revision, display_text, spoken_text, status, created_by, created_at]
      properties:
        id: {type: string, format: uuid}
        scope: {type: string, enum: [platform_catalog, tenant_private]}
        namespace: {type: string, example: mobility.place}
        external_id: {type: string}
        locale: {type: string}
        revision: {type: integer, minimum: 1}
        display_text: {type: string}
        spoken_text: {type: string}
        native_script: {type: boolean}
        note: {type: string}
        provenance_kind: {type: string}
        provenance_uri: {type: string}
        source_revision: {type: string}
        status: {type: string, enum: [draft, approved, rejected, revoked]}
        created_by: {type: string}
        approved_by: {type: string}
        created_at: {type: string, format: date-time}
        approved_at: {type: string, format: date-time}
    SpeechLexiconOverrideRequest:
      type: object
      required: [revision, display_text, spoken_text]
      properties:
        revision: {type: integer, minimum: 1}
        display_text: {type: string}
        spoken_text: {type: string}
        native_script: {type: boolean}
        note: {type: string}
        provenance_kind: {type: string}
        provenance_uri: {type: string}
        source_revision: {type: string}
    SpeechLexiconResolution:
      type: object
      required: [display_text, spoken_text, scope, pronunciation_fingerprint, unsafe_script_fallback, publishable]
      properties:
        display_text: {type: string}
        spoken_text: {type: string}
        entry_id: {type: string, format: uuid}
        entry_revision: {type: integer, minimum: 1}
        scope: {type: string, enum: [platform_catalog, tenant_private]}
        pronunciation_fingerprint: {type: string, pattern: "^[0-9a-f]{64}$"}
        unsafe_script_fallback: {type: boolean}
        publishable: {type: boolean}
    SpeechRenderSlot:
      type: object
      required: [namespace, external_id, revision, display_text]
      properties:
        namespace: {type: string, example: mobility.place}
        external_id: {type: string}
        revision: {type: string}
        display_text: {type: string}
    SpeechRenderResolveRequest:
      type: object
      required: [recipe_key, recipe_version, locale, slots, voice_profile_version, voice, target_asset_name]
      properties:
        recipe_key: {type: string}
        recipe_version: {type: integer, minimum: 1}
        locale: {type: string}
        slots: {type: object, additionalProperties: {$ref: "#/components/schemas/SpeechRenderSlot"}}
        voice_profile_version: {type: string}
        voice: {type: string}
        tone: {type: string}
        style_tags: {type: array, items: {type: string}}
        pace: {type: number, format: float, minimum: 0.5, maximum: 2}
        temperature: {type: number, format: float, minimum: 0.01, maximum: 2}
        target_asset_name: {type: string}
        target_folder_id: {type: string}
        custom_text: {type: string, description: Reviewed custom text is always tenant-private.}
        custom_text_reviewed: {type: boolean}
        use_context_id: {type: string}
        use_context_revision: {type: string}
        territories: {type: array, items: {type: string}}
        rights_approval_ids: {type: array, items: {type: string, format: uuid}}
    SpeechRenderOperation:
      type: object
      required: [operation_id, done, status, deadline, retryable, disposition, scope, publishable]
      properties:
        operation_id: {type: string, format: uuid}
        done: {type: boolean}
        status: {type: string, enum: [queued, leased, provider_in_flight, post_processing, ready, attention_required, failed, cancelled, expired]}
        deadline: {type: string, format: date-time}
        reason_code: {type: string, enum: ["", validation_failed, rights_unavailable, quota_exceeded, provider_terminal, provider_outcome_unknown, postprocess_failed, storage_failed, deadline_exceeded, cancelled]}
        retryable: {type: boolean}
        next_action: {type: string}
        disposition: {type: string, enum: [generated, tenant_hit, platform_hit, generation_started, fallback]}
        scope: {type: string, enum: [platform_catalog, tenant_private]}
        speech_render_spec_id: {type: string, format: uuid}
        speech_rendition_id: {type: string, format: uuid}
        asset_id: {type: string}
        asset_revision_id: {type: integer, minimum: 1}
        content_key: {type: string}
        checksum_sha256: {type: string, pattern: "^[0-9a-f]{64}$"}
        review_state: {type: string}
        rights_state: {type: string}
        rights_fingerprint: {type: string, pattern: "^[0-9a-f]{64}$"}
        publishable: {type: boolean}
    SpeechRenditionReview:
      type: object
      required: [speech_rendition_id, checksum_sha256, review_state, publishable]
      properties:
        speech_rendition_id: {type: string, format: uuid}
        checksum_sha256: {type: string, pattern: "^[0-9a-f]{64}$"}
        review_state: {type: string, enum: [tenant_acknowledged, platform_review_pending, platform_approved, rejected, revoked]}
        publishable: {type: boolean}
    SpeechDeliveryComponent:
      type: object
      required: [speech_rendition_id, gap_after_ms]
      properties:
        speech_rendition_id: {type: string, format: uuid}
        gap_after_ms: {type: integer, minimum: 0, maximum: 60000}
    SpeechDeliveryResolveRequest:
      type: object
      required: [components, merge_profile_version]
      properties:
        components: {type: array, minItems: 1, maxItems: 20, items: {$ref: "#/components/schemas/SpeechDeliveryComponent"}}
        merge_profile_version: {type: string}
        approved_cue_id: {type: string}
    SpeechDeliveryAsset:
      type: object
      required: [speech_delivery_bundle_id, asset_id, asset_revision_id, content_key, checksum_sha256, scope, publishable]
      properties:
        speech_delivery_bundle_id: {type: string, format: uuid}
        asset_id: {type: string}
        asset_revision_id: {type: integer, minimum: 1}
        content_key: {type: string}
        checksum_sha256: {type: string, pattern: "^[0-9a-f]{64}$"}
        scope: {type: string, enum: [platform_catalog, tenant_private]}
        rights_fingerprint: {type: string, pattern: "^[0-9a-f]{64}$"}
        publishable: {type: boolean}
        valid_until: {type: string, format: date-time}
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: unauthorized
            message:
              type: string
              example: authentication context is missing
            details:
              type: object
              additionalProperties: true
              description: Optional machine-readable details for field-level or input-specific errors.
              example:
                validation_issues:
                  - code: unsupported_value
                    severity: warning
                    message: The requested value is not supported.
                    field: content_config.type
    OutputControlOperation:
      type: object
      required:
        - control_id
        - action
        - scope
        - reason
        - status
        - correlation_id
        - expires_at
        - actor
        - accepted_at
        - created_at
        - updated_at
        - results
      properties:
        control_id:
          type: string
          format: uuid
        action:
          type: string
          enum:
            - stop
            - set_volume
            - set_mute
            - emergency_play
        scope:
          type: string
          enum:
            - output
            - all_outputs
            - zone
        reason:
          type: string
        status:
          type: string
          enum:
            - accepted
            - published
            - acknowledged
            - completed
            - partially_completed
            - rejected
            - failed
            - expired
        correlation_id:
          type: string
        asset_id:
          type: string
        priority:
          type: integer
          enum:
            - 3
        expires_at:
          type: string
          format: date-time
        actor:
          type: object
          required:
            - type
            - id
          properties:
            type:
              type: string
              enum:
                - user
                - api_key
            id:
              type: string
        announcement_id:
          type: string
        dispatch_status:
          type: string
          enum:
            - pending
            - processing
            - dispatched
            - failed
          description: Durable emergency dispatch state; omitted for non-emergency controls.
        dispatch_failure_code:
          type: string
          enum:
            - invalid_asset
            - invalid_target
            - materialization_unavailable
            - materialization_failed
            - attempt_budget_exhausted
          description: Stable, non-sensitive terminal or retry failure code.
        last_error:
          type: string
        accepted_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/OutputControlResult"
        zone_id:
          type: string
          format: uuid
        zone_version:
          type: integer
          format: int64
        target_hash:
          type: string
        expected_target_count:
          type: integer
    OutputControlResult:
      type: object
      required:
        - control_id
        - device_id
        - output_id
        - command_message_id
        - status
        - created_at
        - updated_at
      properties:
        control_id:
          type: string
          format: uuid
        device_id:
          type: string
        output_id:
          type: string
        expected_message_id:
          type: string
        command_message_id:
          type: string
        desired_version:
          type: integer
          format: int64
        status:
          type: string
          enum:
            - accepted
            - published
            - acknowledged
            - completed
            - noop
            - rejected
            - failed
            - expired
        applied_volume:
          type: integer
          minimum: 0
          maximum: 100
        applied_mute:
          type: boolean
        stopped_message_id:
          type: string
        reason:
          type: string
        published_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        proof_at:
          type: string
          format: date-time
        announcement_id:
          type: string
        message_id:
          type: string
        decision_id:
          type: string
          description: Durable decision identifier for emergency playback proof.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OutputControlList:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/OutputControlOperation"
        cursor:
          type: string
    CreateOutputControlRequest:
      type: object
      additionalProperties: false
      required:
        - action
        - scope
        - target
        - parameters
        - reason
      properties:
        action:
          type: string
          enum:
            - stop
            - set_volume
            - set_mute
            - emergency_play
        scope:
          type: string
          enum:
            - output
            - all_outputs
            - zone
        target:
          type: object
          additionalProperties: false
          required:
            - device_id
          properties:
            device_id:
              type: string
              minLength: 1
            output_id:
              type: string
              pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          description: output_id is required for scope=output and forbidden for scope=all_outputs; it never defaults to main.
        parameters:
          type: object
          additionalProperties: false
          properties:
            expected_message_id:
              type: string
            force_current:
              type: boolean
              default: false
            drain_queue:
              type: boolean
              default: false
            volume:
              type: integer
              minimum: 0
              maximum: 100
            mute:
              type: boolean
            asset_id:
              type: string
              description: Customer-owned immutable audio asset; arbitrary URLs are forbidden.
        reason:
          type: string
          minLength: 1
          maxLength: 240
        zone_id:
          type: string
          format: uuid
        expected_zone_version:
          type: integer
          format: int64
        expected_target_count:
          type: integer
          minimum: 1
          maximum: 100
    DecisionPreviewSummary:
      type: object
      required:
        - result
      properties:
        decision_id:
          type: string
          description: Persisted preview decision ID when decision recording is configured.
        result:
          type: string
          enum:
            - accepted
            - accepted_with_warnings
            - rejected
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/DecisionReason"
        warning_confirmation:
          $ref: "#/components/schemas/WarningConfirmation"
    WarningConfirmation:
      type: object
      required:
        - required
        - acknowledged
      properties:
        required:
          type: boolean
          description: True when this warning plan must be acknowledged before commit side effects proceed.
        token:
          type: string
          description: Echo this value as warning_confirmation_token on the follow-up commit request.
        acknowledged:
          type: boolean
          description: True when the supplied token matched the current warning plan.
    DecisionReason:
      type: object
      required:
        - policy
        - code
        - severity
        - message
      properties:
        policy:
          type: string
          example: schedule_analysis
        code:
          type: string
          example: exact_duplicate
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
    AnnouncementActivationRequest:
      type: object
      properties:
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings activation decision; required to retry with warning acknowledgment.
    AnnouncementStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - draft
            - pending_review
            - active
            - paused
            - completed
            - expired
            - failed
            - rejected
        reason:
          type: string
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings activation decision when status is active.
    Announcement:
      type: object
      required:
        - id
        - name
        - type
        - status
        - content_config
        - priority
        - correlation_id
        - status_history
        - created_at
        - updated_at
        - version
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum:
            - draft
            - pending_review
            - active
            - paused
            - completed
            - expired
            - failed
            - rejected
        content_config:
          type: object
          additionalProperties: true
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        targeting_config:
          type: object
          additionalProperties: true
        device_id:
          type: string
        group_id:
          type: string
        priority:
          type: integer
        correlation_id:
          type: string
        status_history:
          type: array
          items:
            type: object
            required:
              - from
              - to
              - at
            properties:
              from:
                type: string
              to:
                type: string
              at:
                type: string
                format: date-time
              reason:
                type: string
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        version:
          type: integer
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    TriggerConfig:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - instant
            - scheduled
            - repetitive
            - event_driven
            - chained
            - conditional
            - dynamic
        cron_expr:
          type: string
          example: 0 9 * * 1-5
        timezone:
          type: string
          example: Asia/Kolkata
        mode:
          type: string
          enum:
            - weekly
            - once
          description: Scheduled trigger mode. Omit or use weekly for cron schedules; use once with fire_at for one-time schedules.
        fire_at:
          type: string
          format: date-time
          description: One-time scheduled fire timestamp. Required when mode is once.
        max_firings:
          type: integer
          minimum: 1
          maximum: 1
          description: One-time schedules use max_firings=1.
        fired_count:
          type: integer
          minimum: 0
          description: Number of completed one-time firings reported by the schedule lifecycle.
        interval_mins:
          type: integer
          minimum: 1
          description: Repetitive interval mode. Exactly one of interval_mins or occurrences_per_window is required for repetitive schedules.
        occurrences_per_window:
          type: integer
          minimum: 1
          description: Repetitive count mode. Generates this many minute-aligned starts inside each window when audio duration fits.
        window_start:
          type: string
          example: 09:00
        window_end:
          type: string
          example: 18:00
        webhook_event:
          type: string
          minLength: 1
          description: Partner business-event selector. Required when type is event_driven.
          example: bus.stop.approaching
        conditions:
          type: array
          description: Legacy flat conditional rule; every condition must match.
          items:
            $ref: "#/components/schemas/RuleCondition"
        rule:
          $ref: "#/components/schemas/Rule"
    Rule:
      type: object
      description: Bounded conditional rule tree. Evaluation is local only; no scripts, regex, or network calls.
      properties:
        mode:
          type: string
          enum:
            - all
            - any
          default: all
        conditions:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/RuleCondition"
        groups:
          type: array
          description: Nested rule groups. PITCH service evaluation currently caps depth at 5.
          items:
            $ref: "#/components/schemas/Rule"
    RuleCondition:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          example: crowd_level
        operator:
          type: string
          enum:
            - eq
            - ne
            - gt
            - lt
            - gte
            - lte
            - contains
        value:
          type: string
          maxLength: 512
          example: high
    AnnouncementCreateRequest:
      type: object
      required:
        - type
        - content_config
      properties:
        name:
          type: string
          description: Customer-facing announcement name. Empty or whitespace-only names are replaced with a readable generated fallback.
        type:
          type: string
          enum:
            - instant
            - scheduled
            - repetitive
            - conditional
            - event_driven
            - chained
          description: Create-supported announcement types in the current PITCH service. event_driven requires trigger_config.type=event_driven and trigger_config.webhook_event.
        targeting_config:
          type: object
          additionalProperties: true
          description: Optional structured targeting config.
        device_id:
          type: string
          description: Explicit device target shortcut. When output_id is omitted, this targets the main audio output slot.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot for device_id schedules. Non-main values require a matching reported output that is enabled and ready; unavailable outputs return invalid_target.
        targets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutputTarget"
          description: Explicit device/output targets for scheduled, repetitive, conditional, or chained announcements. Group/all targeting remains main-only unless product defines all-output semantics.
        group_id:
          type: string
          description: Explicit group target shortcut.
        content_config:
          type: object
          additionalProperties: true
          description: Announcement content configuration, such as an uploaded asset, HTTPS audio, text-to-speech, or chained content. Event-driven announcements require durable playable content; prefer asset_id, and include a checksum for URL content.
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        priority:
          type: integer
          minimum: 0
          maximum: 3
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings decision; required to retry with warning acknowledgment.
    OutputTarget:
      type: object
      description: Playback target for one audio output on a physical device. output_id defaults to main when omitted. Non-main outputs require a matching reported output that is enabled and ready.
      required:
        - device_id
      properties:
        device_id:
          type: string
          description: Physical device identifier.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot identifier. Omit or use main for legacy single-output behavior.
    AnnouncementListResponse:
      type: object
      required:
        - announcements
        - total
      properties:
        announcements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        total:
          type: integer
        cursor:
          type: string
    InstantAnnouncementResponse:
      type: object
      required:
        - correlation_id
        - status
      properties:
        announcement_id:
          type: string
          description: Created announcement id for a single-device instant request.
        group_delivery_id:
          type: string
          description: Batch delivery id for multi-device instant requests.
        correlation_id:
          type: string
        status:
          type: string
          enum:
            - queued
        total:
          type: integer
          description: Number of target results for multi-device instant requests.
        targets:
          type: array
          items:
            type: object
            required:
              - announcement_id
              - device_id
              - correlation_id
              - status
            properties:
              announcement_id:
                type: string
              device_id:
                type: string
              output_id:
                type: string
                description: Present for non-main output targets.
              correlation_id:
                type: string
              status:
                type: string
                enum:
                  - queued
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    InstantAnnouncementRequest:
      type: object
      description: Exactly one of device_id, device_ids, targets, or group_id is accepted by request shape. The PITCH service currently returns invalid_target for group_id because group delivery requires per-device expansion. Missing output_id defaults to main.
      oneOf:
        - required:
            - device_id
        - required:
            - device_ids
        - required:
            - targets
        - required:
            - group_id
      anyOf:
        - required:
            - audio_url
        - required:
            - asset_id
      properties:
        name:
          type: string
        device_id:
          type: string
          description: Single target device identifier. When output_id is omitted, this targets the main audio output slot.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot for device_id. Non-main values require the device to report that output as enabled and ready.
        device_ids:
          type: array
          minItems: 1
          items:
            type: string
          description: Multiple target device identifiers. The PITCH service creates one instant delivery per device.
        targets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutputTarget"
          description: Explicit device/output targets for mixed main and aux batch delivery. device_ids may only be combined with targets when both normalize to the same target set.
        group_id:
          type: string
          description: Group target identifier accepted by request shape but currently rejected by the handler with invalid_target.
        zone_id:
          type: string
          format: uuid
          description: Versioned output zone resolved once and transactionally enqueued as explicit per-output deliveries.
        expected_zone_version:
          type: integer
          format: int64
        expected_target_count:
          type: integer
          minimum: 1
          maximum: 500
        audio_url:
          type: string
          format: uri
          description: Direct audio URL. Required when asset_id is omitted.
        asset_id:
          type: string
          description: Audio library asset identifier. Required when audio_url is omitted.
        checksum:
          type: string
        priority:
          type: integer
          minimum: 0
          maximum: 3
        interrupt_active:
          type: boolean
          default: true
          description: When true or omitted, a higher-priority instant announcement may interrupt active playback.
    ScheduleStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - active
            - paused
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    UpdateScheduleStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - active
            - paused
        reason:
          type: string
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings decision when resuming a schedule.
    ScheduleListItem:
      type: object
      required:
        - id
        - name
        - type
        - status
        - content_config
        - priority
        - timezone
        - created_at
        - updated_at
      properties:
        id:
          type: string
        name:
          type: string
          maxLength: 60
        type:
          type: string
          enum:
            - scheduled
            - repetitive
            - chained
            - dynamic
        status:
          type: string
        content_config:
          type: object
          additionalProperties: true
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        targeting_config:
          type: object
          additionalProperties: true
        device_id:
          type: string
        group_id:
          type: string
        priority:
          type: integer
        timezone:
          type: string
          description: IANA timezone used to display preview fire times for this schedule.
          example: Asia/Kolkata
        next_fire_times:
          type: array
          maxItems: 10
          items:
            type: string
            format: date-time
        preview_error:
          type: string

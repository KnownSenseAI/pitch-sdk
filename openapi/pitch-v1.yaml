        affected_device_ids:
          type: array
          items:
            type: string
        group_count:
          type: integer
        affected_devices_unknown:
          type: boolean
        resync_queued:
          type: boolean
    AudioAssetRevisionSummary:
      type: object
      required:
        - revision
        - checksum
        - duration_ms
      properties:
        revision:
          type: integer
        checksum:
          type: string
        duration_ms:
          type: integer
    AudioTTSRevisionRequest:
      type: object
      additionalProperties: false

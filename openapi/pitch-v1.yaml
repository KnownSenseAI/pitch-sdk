        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    UpdateScheduleRequest:
      type: object
      x-examples:
        retargetAuxToMain:
          summary: Move an active schedule from aux to main
          value:
            targeting_config:
              type: device
              targets:
                - device_id: spa-101
                  output_id: main
            priority: 2
        splitAndRetargetFollowing:
          summary: Keep earlier occurrences unchanged and retarget this and following
          value:
            edit_scope: this_and_following
            effective_occurrence_at: 2026-07-20T09:00:00Z
            targeting_config:
              type: device
              targets:
                - device_id: spa-202
                  output_id: aux
            priority: 3
      properties:
        name:
          type: string
          maxLength: 60
          description: Customer-facing schedule name. Empty or whitespace-only names are replaced with a readable generated fallback.
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        content_config:
          type: object
          additionalProperties: true
          description: Replacement content for this_occurrence, or new schedule content for whole_schedule/this_and_following edits.
        targeting_config:
          type: object
          additionalProperties: true
          description: Complete replacement device targeting object for whole_schedule or this_and_following. Pairs are normalized and deduplicated; durable schedules require type=device.
        priority:
          type: integer
          minimum: 0
          maximum: 3
          description: Replacement priority for whole_schedule or this_and_following.
        edit_scope:
          type: string
          enum:
            - whole_schedule
            - this_occurrence
            - this_and_following
          default: whole_schedule
        effective_occurrence_at:
          type: string
          format: date-time
          description: Original occurrence timestamp required for this_occurrence and this_and_following.
        replacement_fire_at:
          type: string
          format: date-time
          description: Replacement timestamp for this_occurrence. Target, type, priority, and lane remain unchanged.
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings decision; required to apply schedule updates with warning conflicts.
    SchedulePreviewResponse:
      type: object
      required:
        - trigger_type
        - timezone
        - next_fire_times
        - entry_count
      properties:
        trigger_type:
          type: string
          enum:
            - scheduled

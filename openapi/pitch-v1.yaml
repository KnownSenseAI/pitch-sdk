        allowed:
          type: boolean
        results:
          type: array
          items:
            $ref: "#/components/schemas/TargetPreflightResult"
    TargetPreflightResult:
      type: object
      required:
        - device_id
        - output_id
        - allowed
        - available
        - delivery_mode
        - supports_parallel_cached_playback
        - supports_parallel_mixed_playback
        - supports_parallel_live_playback
      properties:
        device_id:
          type: string
        output_id:
          type: string
        allowed:
          type: boolean
        reason:
          type: string
          enum:
            - invalid_target
            - output_not_reported
            - output_disabled
            - device_offline
            - capability_stale
            - output_not_ready
            - shared_transport_busy
            - content_mode_unknown
        warning:
          type: string
        available:
          type: boolean
        last_reported_at:
          type: string
          format: date-time
          nullable: true
        delivery_mode:
          type: string
          enum:
            - cached
            - live
            - unknown
        supports_parallel_cached_playback:
          type: boolean
        supports_parallel_mixed_playback:
          type: boolean
        supports_parallel_live_playback:
          type: boolean
    TargetPreflightRequest:
      type: object
      required:
        - intent
        - targets
      properties:
        intent:
          type: string
          enum:
            - instant
            - event
            - control
            - schedule_authoring
            - schedule_activation
        targets:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: "#/components/schemas/OutputTarget"
        content_config:
          type: object
          additionalProperties: true
    BulkAudioUploadResponse:
      type: object
      required:
        - assets
        - errors

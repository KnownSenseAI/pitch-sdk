          format: uuid
        version:
          type: integer
          format: int64
        target_hash:
          type: string
        total:
          type: integer
        ready:
          type: integer
        blocked:
          type: integer
        targets:
          type: array
          items:
            type: object
            required:
              - device_id
              - output_id
              - ready
              - observed_at
              - source_mode
              - available
            properties:
              device_id:
                type: string
              output_id:
                type: string
              ready:
                type: boolean
              reason:
                type: string
              observed_at:
                type: string
                format: date-time
              last_reported_at:
                type: string
                format: date-time
              source_mode:
                type: string
              available:
                type: boolean
              time_synced:
                type: boolean
              supports_parallel_cached_playback:
                type: boolean
              supports_parallel_mixed_playback:
                type: boolean
              supports_parallel_live_playback:
                type: boolean
    OutputZonePreflightRequest:

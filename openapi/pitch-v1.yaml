        "429":
          $ref: "#/components/responses/RateLimited"
components:
  responses:
    RateLimited:
      description: The authenticated tenant or client IP exceeded its configured per-minute quota.
      headers:
        Retry-After:
          description: Seconds until the current minute bucket resets.
          schema:
            type: integer
            minimum: 1
        X-RateLimit-Limit:
          schema:
            type: integer
        X-RateLimit-Remaining:
          schema:
            type: integer
            minimum: 0
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated principal is not allowed to access the resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required dependency is unavailable or not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource state conflicts with the requested operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    UnprocessableEntity:
      description: Request syntax is valid, but the requested occurrence-scoped edit is unsupported.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              example: unauthorized
            message:
              type: string
              example: missing tenant context
            details:
              type: object
              additionalProperties: true
              description: Optional machine-readable details for field-level or input-specific errors.
              example:
                validation_issues:
                  - code: unsupported_tts_symbol
                    severity: warning
                    message: Emoji, decorative symbols, and formatting marks are removed before speech because they cannot be read naturally.
                    text: 🎉
    OutputControlOperation:
      type: object
      required:
        - control_id
        - action
        - scope
        - reason
        - status
        - correlation_id
        - expires_at
        - actor
        - accepted_at
        - created_at
        - updated_at
        - results
      properties:
        control_id:
          type: string
          format: uuid
        action:
          type: string
          enum:
            - stop
            - set_volume
            - set_mute
            - emergency_play
        scope:
          type: string
          enum:
            - output
            - all_outputs
            - zone
        reason:
          type: string
        status:
          type: string
          enum:
            - accepted
            - published
            - acknowledged
            - completed
            - partially_completed
            - rejected
            - failed
            - expired
        correlation_id:
          type: string
        asset_id:
          type: string
        priority:
          type: integer
          enum:
            - 3
        expires_at:
          type: string
          format: date-time
        actor:
          type: object
          required:
            - type
            - id
          properties:
            type:
              type: string
              enum:
                - user
                - api_key
            id:
              type: string
        announcement_id:
          type: string
        dispatch_status:
          type: string
          enum:
            - pending
            - processing
            - dispatched
            - failed
          description: Durable emergency dispatch state; omitted for non-emergency controls.
        dispatch_failure_code:
          type: string
          enum:
            - invalid_asset
            - invalid_target
            - materialization_unavailable
            - materialization_failed
            - attempt_budget_exhausted
          description: Stable, non-sensitive terminal or retry failure code.
        last_error:
          type: string
        accepted_at:
          type: string
          format: date-time
        published_at:
          type: string
          format: date-time
        acknowledged_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        results:
          type: array
          items:
            $ref: "#/components/schemas/OutputControlResult"
        zone_id:
          type: string
          format: uuid
        zone_version:
          type: integer
          format: int64
        target_hash:
          type: string
        expected_target_count:
          type: integer
    OutputControlResult:
      type: object
      required:
        - control_id
        - device_id
        - output_id
        - command_message_id
        - status
        - created_at
        - updated_at
      properties:

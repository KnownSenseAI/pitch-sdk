        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    OutputControlList:
      type: object
      required:
        - operations
      properties:
        operations:
          type: array
          items:
            $ref: "#/components/schemas/OutputControlOperation"
        cursor:
          type: string
    CreateOutputControlRequest:
      type: object
      additionalProperties: false
      required:
        - action
        - scope
        - target
        - parameters
        - reason
      properties:
        action:
          type: string
          enum:
            - stop
            - set_volume
            - set_mute
            - emergency_play
        scope:
          type: string
          enum:
            - output
            - all_outputs
            - zone
        target:
          type: object
          additionalProperties: false
          required:
            - device_id
          properties:
            device_id:
              type: string
              minLength: 1
            output_id:
              type: string
              pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          description: output_id is required for scope=output and forbidden for scope=all_outputs; it never defaults to main.
        parameters:
          type: object
          additionalProperties: false
          properties:
            expected_message_id:
              type: string
            force_current:
              type: boolean
              default: false
            drain_queue:
              type: boolean
              default: false
            volume:
              type: integer
              minimum: 0
              maximum: 100
            mute:
              type: boolean
            asset_id:
              type: string
              description: Tenant-owned immutable audio asset; arbitrary URLs are forbidden.
        reason:
          type: string
          minLength: 1
          maxLength: 240
        zone_id:
          type: string
          format: uuid
        expected_zone_version:
          type: integer
          format: int64
        expected_target_count:
          type: integer
          minimum: 1
          maximum: 100
    DecisionPreviewSummary:
      type: object
      required:
        - result
      properties:
        decision_id:
          type: string
          description: Persisted preview decision ID when decision recording is configured.
        result:
          type: string
          enum:
            - accepted
            - accepted_with_warnings
            - rejected
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/DecisionReason"
        warning_confirmation:
          $ref: "#/components/schemas/WarningConfirmation"
    WarningConfirmation:
      type: object
      required:
        - required
        - acknowledged
      properties:
        required:
          type: boolean
          description: True when this warning plan must be acknowledged before commit side effects proceed.
        token:
          type: string
          description: Echo this value as warning_confirmation_token on the follow-up commit request.
        acknowledged:
          type: boolean
          description: True when the supplied token matched the current warning plan.
    DecisionReason:
      type: object
      required:
        - policy
        - code
        - severity
        - message
      properties:
        policy:
          type: string
          example: schedule_analysis
        code:
          type: string
          example: exact_duplicate
        severity:
          type: string
          enum:
            - info
            - warning
            - error
        message:
          type: string
    AnnouncementActivationRequest:
      type: object
      properties:
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings activation decision; required to retry with warning acknowledgment.
    AnnouncementStatusRequest:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - draft
            - pending_review
            - active
            - paused
            - completed
            - expired
            - failed
            - rejected
        reason:
          type: string
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings activation decision when status is active.
    Announcement:
      type: object
      required:
        - id
        - tenant_id
        - name
        - type
        - status
        - content_config
        - priority
        - correlation_id
        - status_history
        - created_at
        - updated_at
        - version
        - created_by
      properties:
        id:
          type: string
        tenant_id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string
          enum:
            - draft
            - pending_review
            - active
            - paused
            - completed
            - expired
            - failed
            - rejected
        content_config:
          type: object
          additionalProperties: true
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        targeting_config:
          type: object
          additionalProperties: true
        device_id:
          type: string
        group_id:
          type: string
        priority:
          type: integer
        correlation_id:
          type: string
        status_history:
          type: array
          items:
            type: object
            required:
              - from
              - to
              - at
            properties:
              from:
                type: string
              to:
                type: string
              at:
                type: string
                format: date-time
              reason:
                type: string
              changed_by:
                type: string
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
        version:
          type: integer
        created_by:
          type: string
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    TriggerConfig:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum:
            - instant
            - scheduled
            - repetitive
            - event_driven
            - geo_triggered
            - sensor_triggered
            - chained
            - conditional
            - dynamic
            - subscription
            - interactive
        cron_expr:
          type: string
          example: 0 9 * * 1-5
        timezone:
          type: string
          example: Asia/Kolkata
        mode:
          type: string
          enum:
            - weekly
            - once
          default: weekly
          description: Scheduled trigger mode. Omit or use weekly for cron schedules; use once with fire_at for one-time schedules.
        fire_at:
          type: string
          format: date-time
          description: One-time scheduled fire timestamp. Required when mode is once.
        max_firings:
          type: integer
          minimum: 1
          maximum: 1
          description: One-time schedules use max_firings=1.
        fired_count:
          type: integer
          minimum: 0
          description: Number of completed one-time firings reported by the schedule lifecycle.
        interval_mins:
          type: integer
          minimum: 1
          description: Repetitive interval mode. Exactly one of interval_mins or occurrences_per_window is required for repetitive schedules.
        occurrences_per_window:
          type: integer
          minimum: 1
          description: Repetitive count mode. Generates this many minute-aligned starts inside each window when audio duration fits.
        window_start:
          type: string
          example: 09:00
        window_end:
          type: string
          example: 18:00
        webhook_event:
          type: string
          minLength: 1
          description: Partner business-event selector. Required when type is event_driven.
          example: bus.stop.approaching
        conditions:
          type: array
          description: Legacy flat conditional rule; every condition must match.
          items:
            $ref: "#/components/schemas/RuleCondition"
        rule:
          $ref: "#/components/schemas/Rule"
    Rule:
      type: object
      description: Bounded conditional rule tree. Evaluation is local only; no scripts, regex, or network calls.
      properties:
        mode:
          type: string
          enum:
            - all
            - any
          default: all
        conditions:
          type: array
          maxItems: 50
          items:
            $ref: "#/components/schemas/RuleCondition"
        groups:
          type: array
          description: Nested rule groups. Backend evaluation currently caps depth at 5.
          items:
            $ref: "#/components/schemas/Rule"
    RuleCondition:
      type: object
      required:
        - field
        - operator
        - value
      properties:
        field:
          type: string
          example: crowd_level
        operator:
          type: string
          enum:
            - eq
            - ne
            - gt
            - lt
            - gte
            - lte
            - contains
        value:
          type: string
          maxLength: 512
          example: high
    AnnouncementCreateRequest:
      type: object
      required:
        - type
        - content_config
      properties:
        name:
          type: string
          description: Customer-facing announcement name. Empty or whitespace-only names are replaced with a readable generated fallback.
        type:
          type: string
          enum:
            - instant
            - scheduled
            - repetitive
            - conditional
            - event_driven
            - chained
          description: Create-supported announcement types in the current backend. event_driven requires trigger_config.type=event_driven and trigger_config.webhook_event.
        targeting_config:
          type: object
          additionalProperties: true
          description: Optional structured targeting config.
        device_id:
          type: string
          description: Explicit device target shortcut. When output_id is omitted, this targets the main audio output slot.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot for device_id schedules. Non-main values require a matching reported output that is enabled and ready; unavailable outputs return invalid_target.
        targets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutputTarget"
          description: Explicit device/output targets for scheduled, repetitive, conditional, or chained announcements. Group/all targeting remains main-only unless product defines all-output semantics.
        group_id:
          type: string
          description: Explicit group target shortcut.
        content_config:
          type: object
          additionalProperties: true
          description: Announcement content config, such as URL, asset, TTS, or chained content. event_driven requires durable playable content; prefer asset_id, and include checksum for URL content. Temporary TTS is not supported.
        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        priority:
          type: integer
          minimum: 0
          maximum: 3
        starts_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        warning_confirmation_token:
          type: string
          description: Token returned by a rejected accepted-with-warnings decision; required to retry with warning acknowledgment.
    OutputTarget:
      type: object
      description: Playback target for one audio output on a physical device. output_id defaults to main when omitted. Non-main outputs require a matching reported output that is enabled and ready.
      required:
        - device_id
      properties:
        device_id:
          type: string
          description: Physical device identifier.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot identifier. Omit or use main for legacy single-output behavior.
    AnnouncementListResponse:
      type: object
      required:
        - announcements
        - total
      properties:
        announcements:
          type: array
          items:
            $ref: "#/components/schemas/Announcement"
        total:
          type: integer
        cursor:
          type: string
    InstantAnnouncementResponse:
      type: object
      required:
        - correlation_id
        - status
      properties:
        announcement_id:
          type: string
          description: Created announcement id for a single-device instant request.
        group_delivery_id:
          type: string
          description: Batch delivery id for multi-device instant requests.
        correlation_id:
          type: string
        status:
          type: string
          enum:
            - queued
        total:
          type: integer
          description: Number of target results for multi-device instant requests.
        targets:
          type: array
          items:
            type: object
            required:
              - announcement_id
              - device_id
              - correlation_id
              - status
            properties:
              announcement_id:
                type: string
              device_id:
                type: string
              output_id:
                type: string
                description: Present for non-main output targets.
              correlation_id:
                type: string
              status:
                type: string
                enum:
                  - queued
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    InstantAnnouncementRequest:
      type: object
      description: Exactly one of device_id, device_ids, targets, or group_id is accepted by request shape. The backend currently returns invalid_target for group_id because group delivery requires per-device expansion. Missing output_id defaults to main.
      oneOf:
        - required:
            - device_id
        - required:
            - device_ids
        - required:
            - targets
        - required:
            - group_id
      anyOf:
        - required:
            - audio_url
        - required:
            - asset_id
      properties:
        name:
          type: string
        device_id:
          type: string
          description: Single target device identifier. When output_id is omitted, this targets the main audio output slot.
        output_id:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]{0,23}$
          default: main
          description: Audio output slot for device_id. Non-main values require the device to report that output as enabled and ready.
        device_ids:
          type: array
          minItems: 1
          items:
            type: string
          description: Multiple target device identifiers. The backend creates one instant delivery per device.
        targets:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/OutputTarget"
          description: Explicit device/output targets for mixed main and aux batch delivery. device_ids may only be combined with targets when both normalize to the same target set.
        group_id:
          type: string
          description: Group target identifier accepted by request shape but currently rejected by the handler with invalid_target.
        zone_id:
          type: string
          format: uuid
          description: Versioned output zone resolved once and transactionally enqueued as explicit per-output deliveries.
        expected_zone_version:
          type: integer
          format: int64
        expected_target_count:
          type: integer
          minimum: 1
          maximum: 500
        audio_url:
          type: string
          format: uri
          description: Direct audio URL. Required when asset_id is omitted.
        asset_id:
          type: string
          description: Audio library asset identifier. Required when audio_url is omitted.
        checksum:
          type: string
        priority:
          type: integer
          minimum: 0
          maximum: 3
        interrupt_active:
          type: boolean
          default: true
          description: When true or omitted, a higher-priority instant announcement may interrupt active playback.
    ScheduleStatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - active
            - paused
        decision:
          $ref: "#/components/schemas/DecisionPreviewSummary"
    UpdateScheduleStatusRequest:

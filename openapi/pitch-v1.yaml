        trigger_config:
          $ref: "#/components/schemas/TriggerConfig"
        content_config:
          type: object
          additionalProperties: true
          description: Replacement content for this_occurrence, or new schedule content for whole_schedule/this_and_following edits.
        targeting_config:
          type: object
          additionalProperties: true
          description: Complete replacement device targeting object for whole_schedule or this_and_following. Pairs are normalized and deduplicated; durable schedules require type=device.
        priority:
          type: integer
          minimum: 0
          maximum: 3
          description: Replacement priority for whole_schedule or this_and_following.
        edit_scope:

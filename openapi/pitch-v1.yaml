      properties:
        folder_id:
          type: string
          description: Target folder id, or root to copy the asset to the library root.
          example: folder-1
        name:
          type: string
          description: Optional name for the copied asset. Defaults to the source name with " copy" appended.
          example: Summer promo copy
    MoveAudioAssetRequest:
      type: object
      required:
        - folder_id
      additionalProperties: false
      properties:
        folder_id:
          type: string
          description: Target folder id, or root to move the asset to the library root.
          example: root
    TTSBatchSaveResponse:
      type: object
      required:
        - assets
        - errors
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AudioAsset"
        merged_asset:
          $ref: "#/components/schemas/AudioAsset"
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    TTSBatchSaveRequest:
      type: object
      required:
        - items
      properties:
        folder_id:
          type: string
          description: Target audio folder id for all saved assets, or root for the library root.
          example: root
        items:
          type: array
          minItems: 1
          maxItems: 5
          items:
            allOf:
              - $ref: "#/components/schemas/TTSPreviewRequest"
              - type: object
                required:
                  - name
                properties:
                  name:
                    type: string
        merge:
          type: object
          properties:
            enabled:
              type: boolean
            name:
              type: string
            gap_ms:
              type: integer
              minimum: 0
              maximum: 60000
              description: Silence inserted between language segments in the merged asset. Defaults to 2000 when omitted.
            language:
              type: string
              example: multi
    TTSPreviewRequest:
      type: object
      additionalProperties: true
      required:
        - text
        - language
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 2500
        language:
          type: string
          example: hi
        voice:
          type: string
          description: Optional PITCH voice identifier.
        tone:
          type: string
          description: Product feeling used when voice is automatic.
        style_tags:
          type: array
          items:
            type: string
          description: Additional style hints used for automatic speaker selection.
        speed:
          type: number
          format: float
          minimum: 0.5
          maximum: 2
          description: Optional speech-speed multiplier.
        spec:
          type: object
          additionalProperties: true
          description: Optional client-side review metadata. Renderer uses top-level voice and speed.
    AudioFolder:
      type: object
      required:
        - id
        - name
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: folder-1
        parent_id:
          type: string
          description: Parent folder id. Omitted for root-level folders.
          example: parent-folder
        name:
          type: string
          example: Summer promos
        depth:
          type: integer
          minimum: 0
          description: Folder depth in tree responses.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        deleted_at:
          type: string
          format: date-time
          nullable: true
    UpdateAudioFolderRequest:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: Monsoon promos
    AudioFolderTreeResponse:
      type: object
      required:
        - folders
      properties:
        folders:
          type: array
          items:
            $ref: "#/components/schemas/AudioFolder"
    CreateAudioFolderRequest:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
          example: Summer promos
        parent_id:
          type: string
          description: Parent folder id, or root/omitted for a root-level folder.
          example: root
    AudioFolderListResponse:
      type: object
      required:
        - breadcrumbs
        - folders
      properties:
        parent:
          $ref: "#/components/schemas/AudioFolder"
        breadcrumbs:
          type: array
          items:
            $ref: "#/components/schemas/AudioFolder"
        folders:
          type: array
          items:
            $ref: "#/components/schemas/AudioFolder"
        truncated:
          type: boolean
          description: True when more matching folders exist than the requested limit.
    TTSSaveRequest:
      allOf:
        - $ref: "#/components/schemas/TTSPreviewRequest"
        - type: object
          additionalProperties: true
          properties:
            name:
              type: string
              description: Saved asset name. Auto-generated from text when omitted.
            folder_id:
              type: string
              description: Target audio folder id, or root/omitted for the library root.
              example: folder-1
    AudioUploadMetadata:
      type: object
      additionalProperties: true
      required:
        - name
      properties:
        name:
          type: string
        folder_id:
          type: string
          description: Target audio folder id, or root/omitted for the library root.
          example: folder-1
        language:
          type: string
          example: hi
        tags:
          type: array
          items:
            type: string
        lifecycle:
          type: string
          enum:
            - permanent
            - temporary
        source:
          type: string
          enum:
            - upload
            - recording
    AudioListResponse:
      type: object
      required:
        - assets
      properties:
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AudioAsset"
        total:
          type: integer
        next_cursor:
          type: string
          description: Cursor for the next page when more assets are available.
    TTSPronunciationApplyResponse:
      allOf:
        - $ref: "#/components/schemas/TTSPronunciationSummary"
        - type: object
          required:
            - inserted
            - skipped
          properties:
            inserted:
              type: integer
            skipped:
              type: integer
    TTSPronunciationSummary:
      type: object
      additionalProperties: false
      required:
        - terms
        - dictionary
        - templates
        - enabled_count
        - max_enabled_terms
      properties:
        terms:
          type: array
          items:
            $ref: "#/components/schemas/TTSPronunciationTerm"
        dictionary:
          $ref: "#/components/schemas/TTSPronunciationDictionary"
        templates:
          type: array
          items:
            $ref: "#/components/schemas/TTSPronunciationTemplate"
        enabled_count:
          type: integer
        max_enabled_terms:
          type: integer
    TTSPronunciationTemplate:
      type: object
      additionalProperties: false
      required:
        - industry
        - label
        - description
        - term_count
        - sample_terms
      properties:
        industry:
          type: string
        label:
          type: string
        description:
          type: string
        term_count:
          type: integer
        sample_terms:
          type: array
          items:
            type: string
    TTSPronunciationDictionary:
      type: object
      additionalProperties: false
      required:
        - term_count
      properties:
        term_count:
          type: integer
        last_synced_at:
          type: string
          format: date-time
    TTSPronunciationTerm:
      type: object
      additionalProperties: false
      required:
        - language
        - word
        - pronunciation
        - enabled
        - source
      properties:
        language:
          type: string
        word:
          type: string
        pronunciation:
          type: string
        enabled:
          type: boolean
        source:
          type: string
        industry:
          type: string
        updated_at:
          type: string
          format: date-time
    TTSPronunciationTermRequest:
      type: object
      additionalProperties: false
      required:
        - language
        - word
        - pronunciation
      properties:
        language:
          type: string
        word:
          type: string
        pronunciation:
          type: string
        enabled:
          type: boolean
    TTSBatchPreviewResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            allOf:
              - type: object
                required:
                  - language
                properties:
                  language:
                    type: string
              - $ref: "#/components/schemas/TTSPreviewResponse"
        errors:
          type: array
          items:
            type: object
            additionalProperties: true
    TTSPreviewResponse:
      type: object
      required:
        - audio_url
        - cache_hit
        - chars_used
      properties:
        audio_url:
          type: string
          format: uri
        checksum:
          type: string
        duration_ms:
          type: integer
        language:
          type: string
        resolved_voice:
          type: string
          description: PITCH voice selected for the preview.
        tone:
          type: string
        style_tags:
          type: array
          items:
            type: string
        cache_hit:
          type: boolean
        chars_used:
          type: integer
          format: int64
        chars_billed:
          type: integer
          format: int64
        tts_remaining:
          type: integer
          format: int64
        tts_limit:
          type: integer
          format: int64
        tts_is_overage:
          type: boolean
    TTSBatchPreviewRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: "#/components/schemas/TTSPreviewRequest"
    TTSBatchComposeResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TTSComposeResponse"
        warnings:
          type: array
          items:
            type: string
    TTSComposeResponse:
      type: object
      additionalProperties: false
      required:
        - text
        - language
        - speaker
        - pace
        - asset_name_suggestion
      properties:
        text:
          type: string
          maxLength: 2500
          example: Kripya platform 3 par peeli rekha ke peeche khade rahein.
        language:
          type: string
          example: hi
        speaker:
          type: string
          description: Empty string means the resolved PITCH default.
        pace:
          type: number
          format: float
          minimum: 0.5
          maximum: 2
          example: 1
        style_tags:
          type: array
          items:
            type: string
          example:
            - professional
            - calm
        rationale:
          type: string
        warnings:
          type: array
          items:
            type: string
        validation_issues:
          type: array
          description: User-visible text ranges that were flagged before text-to-speech, such as emoji or decorative symbols that cannot be spoken.
          items:
            $ref: "#/components/schemas/TTSValidationIssue"
        asset_name_suggestion:
          type: string
          example: platform-3-safety-hi
        cache_hit:
          type: boolean
        ai_remaining:
          type: integer
          format: int64
        ai_limit:
          type: integer
          format: int64
        ai_is_overage:
          type: boolean
    TTSValidationIssue:
      type: object
      additionalProperties: false
      required:
        - code
        - severity
        - message
      properties:
        code:
          type: string
          example: unsupported_tts_symbol
        severity:
          type: string
          enum:
            - warning
            - error
          example: warning
        message:
          type: string
          example: Emoji and decorative symbols are removed before speech because text-to-speech cannot read them.
        text:
          type: string
          description: The flagged text snippet when available.
          example: 🎉
        start:
          type: integer
          description: Zero-based character offset where the flagged text starts.
          example: 23
        end:
          type: integer
          description: Zero-based character offset where the flagged text ends.
          example: 24
    TTSBatchComposeRequest:
      type: object
      additionalProperties: false
      required:
        - prompt
        - languages
      properties:
        prompt:
          type: string
          maxLength: 1000
        languages:
          type: array
          minItems: 1
          maxItems: 5
          items:
            type: string
        speaker:
          type: string
        tone:
          type: string
        pace:
          type: number
          format: float
          minimum: 0.5
          maximum: 2
        audience_context:
          type: string
          maxLength: 280
        max_chars:
          type: integer
          maximum: 2500
    TTSComposeRequest:
      type: object
      additionalProperties: false
      required:
        - language
      properties:
        intent:
          type: string
          maxLength: 1000
          description: User-facing request. Prefer this field for new clients.
          example: Tell platform 3 passengers to stand behind the yellow line in a calm professional tone.
        prompt:
          type: string
          maxLength: 1000
          description: Backward-compatible alias for intent used by the console.
        text:
          type: string
          maxLength: 1000
          description: Backward-compatible alias for intent.
        language:
          type: string
          example: hi
        speaker:
          type: string
          maxLength: 80
          description: Optional PITCH voice identifier.
        voice:
          type: string
          maxLength: 80
          description: Alias for speaker.
        pace:
          type: number
          format: float
          minimum: 0.5
          maximum: 2
          description: Optional requested pace. Out-of-range values are normalized by PITCH.
        style_tags:
          type: array
          maxItems: 8
          items:
            type: string
            maxLength: 40
          example:
            - professional
            - calm
        tone:
          type: string
          maxLength: 40
          example: professional
        emotion:
          type: string
          maxLength: 40
          example: happy
        audience:
          type: string
          maxLength: 280
          example: Platform 3 commuters
        audience_context:
          type: string
          maxLength: 280
          description: Alias for audience.
        venue_type:
          type: string
          maxLength: 80
          example: railway_station
        asset_hint:
          type: string
          maxLength: 80
          example: Platform 3 safety
        max_chars:
          type: integer
          minimum: 1
          maximum: 2500
          example: 500
        context:
          type: object
          maxProperties: 50
          additionalProperties: true
          description: Optional small metadata object. Maximum serialized size is 4096 bytes, maximum depth is 4.
  parameters:
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
      description: Opaque pagination cursor from the previous response.
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
      description: Maximum number of items to return.
    DeviceId:
      name: deviceId
      in: path
      required: true
      schema:
        type: string
        pattern: ^[a-zA-Z0-9_-]{1,128}$
        maxLength: 128
      description: PITCH device identifier.
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Pitch-Key
      description: PITCH partner API key. The legacy X-SmartPA-Key alias remains accepted during the compatibility window.
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PITCH access token
      description: PITCH access token for supported owner/admin operations.
